    function scrollToCurrentTime(isSmooth = true) {
        const svg = document.getElementById('zwl-svg');
        const container = document.getElementById('zwl-container');
        if (!svg || !container) return;
        
        const simTime = getSimTime();
        const nowMins = simTime.getHours() * 60 + simTime.getMinutes() + simTime.getSeconds() / 60 + simTime.getMilliseconds() / 60000;
        
        if (nowMins >= 360 && nowMins <= 1200) {
            const scaleSlider = document.getElementById('zwl-scale-slider');
            const scaleVal = scaleSlider ? parseFloat(scaleSlider.value) : 1.0;
            const gridHeight = 1750 * scaleVal;
            const paddingTop = 15;
            
            const redY = paddingTop + ((nowMins - 360) / (1200 - 360)) * gridHeight;
            const targetScrollTop = redY - (container.clientHeight / 2);
            
            isProgrammaticScroll = true;
            container.scrollTo({
                top: targetScrollTop,
                behavior: isSmooth ? 'smooth' : 'auto'
            });
        }
    }

    function drawZWL() {
        if (!fahrplanData || !bfData) return;
        
        const headerSvg = document.getElementById('zwl-header-svg');
        const svg = document.getElementById('zwl-svg');
        if (!headerSvg || !svg) return;
        
        headerSvg.innerHTML = '';
        svg.innerHTML = '';
        
        let allLabels = [];
        let westEvents = [];
        let doberanEvents = [];
        let umlaufEdges = [];

        function getConnectedUmlaufTrains(startKey) {
            let visited = new Set();
            let queue = [startKey];
            visited.add(startKey);
            
            while (queue.length > 0) {
                const current = queue.shift();
                for (const edge of umlaufEdges) {
                    if (edge[0] === current && !visited.has(edge[1])) {
                        visited.add(edge[1]);
                        queue.push(edge[1]);
                    } else if (edge[1] === current && !visited.has(edge[0])) {
                        visited.add(edge[0]);
                        queue.push(edge[0]);
                    }
                }
            }
            return visited;
        }

        function highlightUmlauf(startKey) {
            const activeKeys = getConnectedUmlaufTrains(startKey);
            
            document.querySelectorAll(".zwl-train-group").forEach(g => {
                const key = g.getAttribute("data-train-key");
                const p = g.querySelector("path:not([stroke='transparent'])");
                if (!p) return;
                
                if (activeKeys.has(key)) {
                    g.style.opacity = "1";
                    p.setAttribute("stroke-width", "5.5");
                } else {
                    g.style.opacity = "0.15";
                }
            });
            
            document.querySelectorAll(".zwl-turnaround-line").forEach(line => {
                const keysStr = line.getAttribute("data-train-keys");
                if (!keysStr) return;
                const [key1, key2] = keysStr.split(",");
                
                if (activeKeys.has(key1) || activeKeys.has(key2)) {
                    line.style.opacity = "1";
                    line.setAttribute("stroke", "#2c3e50"); // darker bold gray
                    line.setAttribute("stroke-width", "3.5");
                } else {
                    line.style.opacity = "0.15";
                }
            });
        }

        function resetUmlaufHighlight() {
            document.querySelectorAll(".zwl-train-group").forEach(g => {
                g.style.opacity = "1";
                const p = g.querySelector("path:not([stroke='transparent'])");
                if (!p) return;
                
                const isPast = g.getAttribute("data-is-past") === "true";
                const isActive = g.getAttribute("data-is-active") === "true";
                p.setAttribute("stroke-width", isPast ? "1.5" : (isActive ? "3.5" : "2"));
            });
            
            document.querySelectorAll(".zwl-turnaround-line").forEach(line => {
                line.style.opacity = "1";
                line.setAttribute("stroke", "#bdc3c7"); // subtle grey
                line.setAttribute("stroke-width", "2.5");
            });
        }
        
        const width = 1000;
        const paddingLeft = 130;
        const paddingRight = 60;
        
        const xStart = paddingLeft;
        const xEnd = width - paddingRight;
        
        // Dynamische Skalierung der Höhe
        const scaleSlider = document.getElementById('zwl-scale-slider');
        const scaleVal = scaleSlider ? parseFloat(scaleSlider.value) : 1.0;
        const gridHeight = 1750 * scaleVal;
        
        const paddingTop = 15;
        const paddingBottom = 40;
        const height = paddingTop + gridHeight + paddingBottom;
        const yEnd = paddingTop + gridHeight;
        
        svg.setAttribute("height", height);
        
        const showPast = true;
        const proportional = true;
        
        const simTime = getSimTime();
        const nowMins = simTime.getHours() * 60 + simTime.getMinutes() + simTime.getSeconds() / 60 + simTime.getMilliseconds() / 60000;
        
        const standardStations = [
            "Kühlungsborn West",
            "Kühlungsborn Mitte",
            "Kühlungsborn Ost",
            "Steilküste",
            "Heiligendamm",
            "Rennbahn",
            "Bad Doberan Goethestraße",
            "Bad Doberan Stadtmitte",
            "Bad Doberan Bahnhof"
        ];
        
        // Entfernungen berechnen
        let cumDist = [0];
        let totalDist = 0;
        for (let i = 1; i < standardStations.length; i++) {
            const s1 = bfData.find(b => b.name === standardStations[i-1]);
            const s2 = bfData.find(b => b.name === standardStations[i]);
            if (s1 && s2) {
                let latDiff = s2.lat - s1.lat;
                let lngDiff = (s2.lng - s1.lng) * Math.cos(s1.lat * Math.PI / 180);
                let d = Math.sqrt(latDiff * latDiff + lngDiff * lngDiff) * 111.32;
                totalDist += d;
                cumDist.push(totalDist);
            } else {
                cumDist.push(cumDist[i-1] + 1.5);
            }
        }
        
        function getStationX(stationName) {
            const idx = standardStations.indexOf(stationName);
            if (idx === -1) return xStart;
            if (proportional) {
                return xStart + (cumDist[idx] / cumDist[cumDist.length - 1]) * (xEnd - xStart);
            } else {
                return xStart + (idx / (standardStations.length - 1)) * (xEnd - xStart);
            }
        }
        
        let minMins = 24 * 60, maxMins = 0;
        fahrplanData.directions.forEach(dir => dir.trains.forEach(t => {
            if (!isTrainRunningToday(t.restriction, simTime)) return;
            t.times.forEach(ts => {
                if (ts && ts !== '-') {
                    const m = timeToMinutes(ts);
                    if (m < minMins) minMins = m;
                    if (m > maxMins) maxMins = m;
                }
            });
        }));
        if (minMins > maxMins) { minMins = 360; maxMins = 1200; }
        minMins = Math.max(0, minMins - 15);
        maxMins += 15;
        
        function getY(mins) {
            return paddingTop + ((mins - minMins) / (maxMins - minMins)) * gridHeight;
        }
        
        // ------------------ HEADER SVG ZEICHNEN ------------------
        const headerBg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        headerBg.setAttribute("x", "0");
        headerBg.setAttribute("y", "0");
        headerBg.setAttribute("width", width);
        headerBg.setAttribute("height", "90");
        headerBg.setAttribute("fill", "white");
        headerSvg.appendChild(headerBg);
        
        standardStations.forEach((stationName, idx) => {
            const x = getStationX(stationName);
            const stationBf = bfData.find(b => b.name === stationName);
            const labelText = stationBf && stationBf.km !== undefined ? `${formatKm(stationBf.km)} ${stationName}` : stationName;
            
            if (stationName === "Heiligendamm") {
                // Tick 1 (Gleis 1)
                const tick1 = document.createElementNS("http://www.w3.org/2000/svg", "line");
                tick1.setAttribute("x1", x - 5);
                tick1.setAttribute("y1", "75");
                tick1.setAttribute("x2", x - 5);
                tick1.setAttribute("y2", "90");
                tick1.setAttribute("stroke", "#ccc");
                tick1.setAttribute("stroke-width", "1.5");
                headerSvg.appendChild(tick1);
                
                // Label Gl. 1 (Links ausgerichtet, komplett kollisionsfrei)
                const txt1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt1.setAttribute("x", x - 7);
                txt1.setAttribute("y", "84");
                txt1.setAttribute("text-anchor", "end");
                txt1.setAttribute("font-size", "7.5");
                txt1.setAttribute("font-weight", "bold");
                txt1.setAttribute("fill", "#666");
                txt1.textContent = "Gl. 1";
                headerSvg.appendChild(txt1);

                // Tick 2 (Gleis 2)
                const tick2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
                tick2.setAttribute("x1", x + 5);
                tick2.setAttribute("y1", "75");
                tick2.setAttribute("x2", x + 5);
                tick2.setAttribute("y2", "90");
                tick2.setAttribute("stroke", "#ccc");
                tick2.setAttribute("stroke-width", "1.5");
                headerSvg.appendChild(tick2);
                
                // Label Gl. 2 (Rechts ausgerichtet, komplett kollisionsfrei)
                const txt2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
                txt2.setAttribute("x", x + 7);
                txt2.setAttribute("y", "84");
                txt2.setAttribute("text-anchor", "start");
                txt2.setAttribute("font-size", "7.5");
                txt2.setAttribute("font-weight", "bold");
                txt2.setAttribute("fill", "#666");
                txt2.textContent = "Gl. 2";
                headerSvg.appendChild(txt2);
            } else {
                const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
                tick.setAttribute("x1", x);
                tick.setAttribute("y1", "75");
                tick.setAttribute("x2", x);
                tick.setAttribute("y2", "90");
                tick.setAttribute("stroke", "#ccc");
                tick.setAttribute("stroke-width", "1.5");
                headerSvg.appendChild(tick);
            }
            
            const labelTop = document.createElementNS("http://www.w3.org/2000/svg", "text");
            labelTop.setAttribute("x", x);
            labelTop.setAttribute("y", stationName === "Heiligendamm" ? "64" : "70");
            labelTop.setAttribute("text-anchor", "start");
            labelTop.setAttribute("transform", `rotate(-30, ${x}, ${stationName === "Heiligendamm" ? 64 : 70})`);
            labelTop.setAttribute("font-size", "12");
            labelTop.setAttribute("font-weight", "bold");
            labelTop.setAttribute("fill", "#111");
            labelTop.textContent = labelText;
            headerSvg.appendChild(labelTop);
        });
        
        // ------------------ HAUPT DIAGRAMM SVG ZEICHNEN ------------------
        const bgRect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        bgRect.setAttribute("x", xStart);
        bgRect.setAttribute("y", paddingTop);
        bgRect.setAttribute("width", xEnd - xStart);
        bgRect.setAttribute("height", gridHeight);
        bgRect.setAttribute("fill", "#fafafa");
        bgRect.setAttribute("stroke", "#ddd");
        bgRect.setAttribute("stroke-width", "2");
        svg.appendChild(bgRect);
        
        standardStations.forEach((stationName, idx) => {
            const x = getStationX(stationName);
            
            if (stationName === "Heiligendamm") {
                // Gleis 1
                const line1 = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line1.setAttribute("x1", x - 5);
                line1.setAttribute("y1", paddingTop);
                line1.setAttribute("x2", x - 5);
                line1.setAttribute("y2", yEnd);
                line1.setAttribute("stroke", "#ccc");
                line1.setAttribute("stroke-width", "1.5");
                svg.appendChild(line1);
                
                // Gleis 2
                const line2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line2.setAttribute("x1", x + 5);
                line2.setAttribute("y1", paddingTop);
                line2.setAttribute("x2", x + 5);
                line2.setAttribute("y2", yEnd);
                line2.setAttribute("stroke", "#ccc");
                line2.setAttribute("stroke-width", "1.5");
                svg.appendChild(line2);
            } else {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", x);
                line.setAttribute("y1", paddingTop);
                line.setAttribute("x2", x);
                line.setAttribute("y2", yEnd);
                line.setAttribute("stroke", "#e5e5e5");
                line.setAttribute("stroke-width", "1");
                if (idx === 0 || idx === standardStations.length - 1) {
                    line.setAttribute("stroke", "#ccc");
                    line.setAttribute("stroke-width", "1.5");
                }
                svg.appendChild(line);
            }
        });

        
        const colors = ['#e67e22', '#3498db'];
        
        fahrplanData.directions.forEach((dir, dIdx) => {
            const dirColor = colors[dIdx];
            
            dir.trains.forEach(train => {
                if (!isTrainRunningToday(train.restriction, simTime)) return;
                
                const points = getTrainPoints(dir, train, minMins, maxMins, standardStations);
                if (points.length < 2) return;
                
                const lastPoint = points[points.length - 1];
                const firstPoint = points[0];
                const isPast = lastPoint.mins < nowMins;
                const isFuture = firstPoint.mins > nowMins;
                const isActive = !isPast && !isFuture;
                
                if (isPast && !showPast) return;
                
                let pathDesc = "";
                let visiblePoints = 0;
                
                points.forEach((p, pIdx) => {
                    let x = getStationX(p.stationName);
                    if (p.stationName === "Heiligendamm") {
                        x += (dIdx === 0) ? 5 : -5;
                    }
                    const y = getY(p.mins);
                    
                    if (pIdx === 0) {
                        pathDesc += `M ${x},${y}`;
                    } else {
                        pathDesc += ` L ${x},${y}`;
                    }
                    
                    if (p.mins >= minMins && p.mins <= maxMins) {
                        visiblePoints++;
                    }
                });
                
                if (visiblePoints === 0) return;
                
                const trainKey = `${dIdx}_${train.id}`;
                const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
                group.setAttribute("class", "zwl-train-group");
                group.setAttribute("data-train-key", trainKey);
                group.setAttribute("data-is-past", isPast.toString());
                group.setAttribute("data-is-active", isActive.toString());
                group.style.cursor = "pointer";
                
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", pathDesc);
                path.setAttribute("fill", "none");
                path.setAttribute("stroke", dirColor);
                path.setAttribute("stroke-width", isActive ? "3.5" : "2");
                if (isPast) {
                    path.setAttribute("stroke-opacity", "0.4");
                    path.setAttribute("stroke-width", "1.5");
                }
                group.appendChild(path);
                
                const hoverPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
                hoverPath.setAttribute("d", pathDesc);
                hoverPath.setAttribute("fill", "none");
                hoverPath.setAttribute("stroke", "transparent");
                hoverPath.setAttribute("stroke-width", "15");
                group.appendChild(hoverPath);
                
                // Uhrzeitbeschriftung an den Kreuzungspunkten
                const hdStops = points.filter(p => p.stationName === "Heiligendamm");
                let processedHeiligendamm = false;
                
                points.forEach((p, pIdx) => {
                    if (p.mins < minMins || p.mins > maxMins) return;
                    
                    const tKey = `${dIdx}_${train.id}`;
                    if (p.stationName === "Kühlungsborn West") {
                        const idx = dir.stations.indexOf(p.stationName);
                        const type = (idx === 0) ? 'dep' : 'arr';
                        let slope = 0;
                        if (type === 'dep') {
                            const pNext = points[pIdx + 1];
                            if (pNext) {
                                const xDep = getStationX("Kühlungsborn West");
                                const xNext = getStationX(pNext.stationName);
                                const yDep = getY(p.mins);
                                const yNext = getY(pNext.mins);
                                slope = (yNext - yDep) / (xNext - xDep);
                            }
                        } else {
                            const pPrev = points[pIdx - 1];
                            if (pPrev) {
                                const xArr = getStationX("Kühlungsborn West");
                                const xPrev = getStationX(pPrev.stationName);
                                const yArr = getY(p.mins);
                                const yPrev = getY(pPrev.mins);
                                slope = (yArr - yPrev) / (xArr - xPrev);
                            }
                        }
                        westEvents.push({ type, mins: p.mins, slope, trainKey: tKey });
                    } else if (p.stationName === "Bad Doberan Bahnhof") {
                        const idx = dir.stations.indexOf(p.stationName);
                        const type = (idx === 0) ? 'dep' : 'arr';
                        let slope = 0;
                        if (type === 'dep') {
                            const pNext = points[pIdx + 1];
                            if (pNext) {
                                const xDep = getStationX("Bad Doberan Bahnhof");
                                const xNext = getStationX(pNext.stationName);
                                const yDep = getY(p.mins);
                                const yNext = getY(pNext.mins);
                                slope = (yNext - yDep) / (xNext - xDep);
                            }
                        } else {
                            const pPrev = points[pIdx - 1];
                            if (pPrev) {
                                const xArr = getStationX("Bad Doberan Bahnhof");
                                const xPrev = getStationX(pPrev.stationName);
                                const yArr = getY(p.mins);
                                const yPrev = getY(pPrev.mins);
                                slope = (yArr - yPrev) / (xArr - xPrev);
                            }
                        }
                        doberanEvents.push({ type, mins: p.mins, slope, trainKey: tKey });
                    }
                    
                    const isWest = (p.stationName === "Kühlungsborn West");
                    const isDoberan = (p.stationName === "Bad Doberan Bahnhof");
                    const isHeiligendamm = (p.stationName === "Heiligendamm");
                    const isTerminus = isWest || isDoberan;
                    
                    let x = getStationX(p.stationName);
                    if (p.stationName === "Heiligendamm") {
                        x += (dIdx === 0) ? 5 : -5;
                    }
                    let y = getY(p.mins);
                    let labelText = "";
                    
                    if (isHeiligendamm) {
                        if (processedHeiligendamm) return; // skip since already merged
                        processedHeiligendamm = true;
                        
                        if (hdStops.length === 2) {
                            const arrMins = hdStops[0].mins;
                            const depMins = hdStops[1].mins;
                            
                            const arrHrs = Math.floor(arrMins / 60);
                            const arrMinsPart = Math.floor(arrMins % 60);
                            const depHrs = Math.floor(depMins / 60);
                            const depMinsPart = Math.floor(depMins % 60);
                            
                            labelText = `${arrHrs.toString().padStart(2, '0')}.${arrMinsPart.toString().padStart(2, '0')} - ${depHrs.toString().padStart(2, '0')}.${depMinsPart.toString().padStart(2, '0')}`;
                            y = getY(arrMins);
                        } else {
                            const hrs = Math.floor(p.mins / 60);
                            const minsPart = Math.floor(p.mins % 60);
                            labelText = `${hrs.toString().padStart(2, '0')}.${minsPart.toString().padStart(2, '0')}`;
                        }
                    } else if (isTerminus) {
                        const hrs = Math.floor(p.mins / 60);
                        const minsPart = Math.floor(p.mins % 60);
                        labelText = `${hrs.toString().padStart(2, '0')}.${minsPart.toString().padStart(2, '0')}`;
                    } else {
                        labelText = Math.floor(p.mins % 60).toString().padStart(2, '0');
                    }
                    
                    let offsetY = (isWest || isDoberan) ? 4 : (isHeiligendamm ? (dIdx === 0 ? -8 : 4) : -8);
                    
                    allLabels.push({
                        stationName: p.stationName,
                        x,
                        y: y + offsetY,
                        isWest,
                        isDoberan,
                        isHeiligendamm,
                        isTerminus,
                        labelText,
                        dirColor,
                        isPast,
                        dIdx,
                        group,
                        trainKey: tKey,
                        restriction: train.restriction
                    });
                });
                
                if (isActive) {
                    let activeX = null;
                    let activeY = getY(nowMins);
                    
                    for (let i = 0; i < points.length - 1; i++) {
                        const p1 = points[i];
                        const p2 = points[i+1];
                        if (nowMins >= p1.mins && nowMins <= p2.mins) {
                            let x1 = getStationX(p1.stationName);
                            if (p1.stationName === "Heiligendamm") {
                                x1 += (dIdx === 0) ? 5 : -5;
                            }
                            let x2 = getStationX(p2.stationName);
                            if (p2.stationName === "Heiligendamm") {
                                x2 += (dIdx === 0) ? 5 : -5;
                            }
                            const factor = (p2.mins - p1.mins === 0) ? 0 : (nowMins - p1.mins) / (p2.mins - p1.mins);
                            activeX = x1 + (x2 - x1) * factor;
                            break;
                        }
                    }
                    
                    if (activeX !== null) {
                        const pulse = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        pulse.setAttribute("cx", activeX);
                        pulse.setAttribute("cy", activeY);
                        pulse.setAttribute("r", "8");
                        pulse.setAttribute("fill", dirColor);
                        pulse.setAttribute("opacity", "0.5");
                        
                        const anim = document.createElementNS("http://www.w3.org/2000/svg", "animate");
                        anim.setAttribute("attributeName", "r");
                        anim.setAttribute("values", "6;12;6");
                        anim.setAttribute("dur", "1.5s");
                        anim.setAttribute("repeatCount", "indefinite");
                        pulse.appendChild(anim);
                        group.appendChild(pulse);
                        
                        const core = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        core.setAttribute("cx", activeX);
                        core.setAttribute("cy", activeY);
                        core.setAttribute("r", "4.5");
                        core.setAttribute("fill", "white");
                        core.setAttribute("stroke", core.getAttribute("stroke") || dirColor);
                        core.setAttribute("stroke-width", "2");
                        group.appendChild(core);
                    }
                }
                
                group.addEventListener("mouseover", (e) => {
                    showZWLTooltip(e, train, dir, points);
                });
                group.addEventListener("mousemove", (e) => {
                    moveZWLTooltip(e);
                });
                group.addEventListener("mouseout", () => {
                    hideZWLTooltip();
                });
                
                svg.appendChild(group);
            });
        });
        
        // ------------------ OVERLAP RESOLUTION FOR LABELS ------------------
        const stations = [...new Set(allLabels.map(l => l.stationName))];
        stations.forEach(stationName => {
            const group = allLabels.filter(l => l.stationName === stationName);
            if (group.length <= 1) return;
            
            // Sort by Y coordinate
            group.sort((a, b) => a.y - b.y);
            
            const isTerminus = group[0].isTerminus;
            const isHeiligendamm = group[0].isHeiligendamm;
            const minDistance = isTerminus ? 15 : (isHeiligendamm ? 13 : 11);
            
            for (let pass = 0; pass < 25; pass++) {
                let changed = false;
                for (let i = 0; i < group.length - 1; i++) {
                    const l1 = group[i];
                    const l2 = group[i+1];
                    const diff = l2.y - l1.y;
                    if (diff < minDistance) {
                        const overlap = minDistance - diff;
                        l1.y -= overlap / 2;
                        l2.y += overlap / 2;
                        changed = true;
                    }
                }
                if (!changed) break;
            }
        });
        
        // ------------------ RENDER LABELS ------------------
        allLabels.forEach(l => {
            const timeLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
            
            let finalX = l.x;
            let align = "middle";
            let fontSize = "9";
            
            if (l.isWest) {
                finalX = l.x - 20;
                align = "end";
                fontSize = "12";
            } else if (l.isDoberan) {
                finalX = l.x + 20;
                align = "start";
                fontSize = "12";
            } else if (l.isHeiligendamm) {
                finalX = l.x + (l.dIdx === 0 ? -8 : 8);
                align = l.dIdx === 0 ? "end" : "start";
                fontSize = "10.5";
            } else {
                finalX = l.x;
                align = "middle";
                fontSize = "9";
            }
            
            timeLabel.setAttribute("x", finalX);
            timeLabel.setAttribute("y", l.y);
            timeLabel.setAttribute("text-anchor", align);
            timeLabel.setAttribute("font-size", fontSize);
            
            timeLabel.setAttribute("font-weight", "bold");
            timeLabel.setAttribute("fill", l.dirColor);
            if (l.isPast) {
                timeLabel.setAttribute("fill-opacity", "0.4");
            }
            timeLabel.setAttribute("paint-order", "stroke");
            timeLabel.setAttribute("stroke", "white");
            timeLabel.setAttribute("stroke-width", "3.5");
            timeLabel.setAttribute("stroke-linejoin", "round");
            
            if (l.isWest || l.isDoberan) {
                timeLabel.setAttribute("pointer-events", "auto");
                timeLabel.style.cursor = "pointer";
                
                timeLabel.addEventListener("mouseover", (e) => {
                    highlightUmlauf(l.trainKey);
                    const [dIdxStr, tId] = l.trainKey.split("_");
                    const dIdx = parseInt(dIdxStr);
                    const dir = fahrplanData.directions[dIdx];
                    const train = dir.trains.find(t => t.id === tId);
                    if (train) {
                        const points = getTrainPoints(dir, train, minMins, maxMins, standardStations);
                        showZWLTooltip(e, train, dir, points);
                    }
                });
                timeLabel.addEventListener("mousemove", (e) => {
                    moveZWLTooltip(e);
                });
                timeLabel.addEventListener("mouseout", () => {
                    resetUmlaufHighlight();
                    hideZWLTooltip();
                });
            } else {
                timeLabel.setAttribute("pointer-events", "none");
            }
            
            timeLabel.textContent = l.labelText;
            svg.appendChild(timeLabel);
            
            if (l.restriction && l.isTerminus) {
                let rX;
                const rectW = 13;
                const textW = 32; // Breite des Zeit-Texts (z. B. "06.40") ca. 32px bei FontSize 12
                
                if (l.isWest) {
                    // Kühlungsborn West (links): das Icon steht IMMER links neben der Zeit
                    rX = finalX - textW - rectW - 4;
                } else if (l.isDoberan) {
                    // Bad Doberan (rechts): das Icon steht IMMER rechts neben der Zeit
                    rX = finalX + textW + 4;
                } else {
                    rX = finalX + 4;
                }
                
                let rY = l.y - 10;
                
                const rGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
                if (l.isPast) rGroup.setAttribute("opacity", "0.4");
                
                const rTitle = document.createElementNS("http://www.w3.org/2000/svg", "title");
                rTitle.textContent = fahrplanData.restrictions ? (fahrplanData.restrictions[l.restriction] || "") : "";
                rGroup.appendChild(rTitle);
                
                const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                bg.setAttribute("x", rX);
                bg.setAttribute("y", rY);
                bg.setAttribute("width", "13");
                bg.setAttribute("height", "13");
                bg.setAttribute("rx", "2");
                bg.setAttribute("fill", "#000");
                rGroup.appendChild(bg);
                
                const rt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                rt.setAttribute("x", rX + 6.5);
                rt.setAttribute("y", rY + 10);
                rt.setAttribute("text-anchor", "middle");
                rt.setAttribute("font-size", "10");
                rt.setAttribute("font-weight", "bold");
                rt.setAttribute("fill", "#fff");
                rt.textContent = l.restriction;
                rGroup.appendChild(rt);
                
                svg.appendChild(rGroup);
            }
        });
        
        // ------------------ TURNAROUND BRACKETS AT TERMINI ------------------
        westEvents.sort((a, b) => a.mins - b.mins);
        for (let i = 0; i < westEvents.length - 1; i++) {
            const e1 = westEvents[i];
            const e2 = westEvents[i+1];
            if (e1.type === 'arr' && e2.type === 'dep') {
                const y1 = getY(e1.mins);
                const y2 = getY(e2.mins);
                const x = getStationX("Kühlungsborn West");
                const offsetX = -10;
                
                const y1_out = y1 + (e1.slope || 0) * offsetX;
                const y2_out = y2 + (e2.slope || 0) * offsetX;
                
                // Add relation to edges list
                umlaufEdges.push([e1.trainKey, e2.trainKey]);
                
                const turnaroundLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const pathData = `M ${x} ${y1} L ${x + offsetX} ${y1_out} L ${x + offsetX} ${y2_out} L ${x} ${y2}`;
                turnaroundLine.setAttribute("d", pathData);
                turnaroundLine.setAttribute("fill", "none");
                turnaroundLine.setAttribute("stroke", "#bdc3c7"); // Light subtle grey
                turnaroundLine.setAttribute("stroke-width", "2.5");
                turnaroundLine.setAttribute("stroke-dasharray", "1,4");
                turnaroundLine.setAttribute("stroke-linecap", "round");
                turnaroundLine.setAttribute("class", "zwl-turnaround-line");
                turnaroundLine.setAttribute("data-train-keys", `${e1.trainKey},${e2.trainKey}`);
                
                const turnaroundHover = document.createElementNS("http://www.w3.org/2000/svg", "path");
                turnaroundHover.setAttribute("d", pathData);
                turnaroundHover.setAttribute("fill", "none");
                turnaroundHover.setAttribute("stroke", "transparent");
                turnaroundHover.setAttribute("stroke-width", "16");
                turnaroundHover.style.cursor = "pointer";
                
                turnaroundHover.addEventListener("mouseover", (e) => {
                    highlightUmlauf(e1.trainKey);
                    const [dIdxStr, tId] = e1.trainKey.split("_");
                    const dIdx = parseInt(dIdxStr);
                    const dir = fahrplanData.directions[dIdx];
                    const train = dir.trains.find(t => t.id === tId);
                    if (train) {
                        const points = getTrainPoints(dir, train, minMins, maxMins, standardStations);
                        showZWLTooltip(e, train, dir, points);
                    }
                });
                turnaroundHover.addEventListener("mousemove", (e) => {
                    moveZWLTooltip(e);
                });
                turnaroundHover.addEventListener("mouseout", () => {
                    resetUmlaufHighlight();
                    hideZWLTooltip();
                });
                
                svg.appendChild(turnaroundLine);
                svg.appendChild(turnaroundHover);
            }
        }
        
        doberanEvents.sort((a, b) => a.mins - b.mins);
        for (let i = 0; i < doberanEvents.length - 1; i++) {
            const e1 = doberanEvents[i];
            const e2 = doberanEvents[i+1];
            if (e1.type === 'arr' && e2.type === 'dep') {
                const y1 = getY(e1.mins);
                const y2 = getY(e2.mins);
                const x = getStationX("Bad Doberan Bahnhof");
                const offsetX = 10;
                
                const y1_out = y1 + (e1.slope || 0) * offsetX;
                const y2_out = y2 + (e2.slope || 0) * offsetX;
                
                // Add relation to edges list
                umlaufEdges.push([e1.trainKey, e2.trainKey]);
                
                const turnaroundLine = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const pathData = `M ${x} ${y1} L ${x + offsetX} ${y1_out} L ${x + offsetX} ${y2_out} L ${x} ${y2}`;
                turnaroundLine.setAttribute("d", pathData);
                turnaroundLine.setAttribute("fill", "none");
                turnaroundLine.setAttribute("stroke", "#bdc3c7"); // Light subtle grey
                turnaroundLine.setAttribute("stroke-width", "2.5");
                turnaroundLine.setAttribute("stroke-dasharray", "1,4");
                turnaroundLine.setAttribute("stroke-linecap", "round");
                turnaroundLine.setAttribute("class", "zwl-turnaround-line");
                turnaroundLine.setAttribute("data-train-keys", `${e1.trainKey},${e2.trainKey}`);
                
                const turnaroundHover = document.createElementNS("http://www.w3.org/2000/svg", "path");
                turnaroundHover.setAttribute("d", pathData);
                turnaroundHover.setAttribute("fill", "none");
                turnaroundHover.setAttribute("stroke", "transparent");
                turnaroundHover.setAttribute("stroke-width", "16");
                turnaroundHover.style.cursor = "pointer";
                
                turnaroundHover.addEventListener("mouseover", (e) => {
                    highlightUmlauf(e1.trainKey);
                    const [dIdxStr, tId] = e1.trainKey.split("_");
                    const dIdx = parseInt(dIdxStr);
                    const dir = fahrplanData.directions[dIdx];
                    const train = dir.trains.find(t => t.id === tId);
                    if (train) {
                        const points = getTrainPoints(dir, train, minMins, maxMins, standardStations);
                        showZWLTooltip(e, train, dir, points);
                    }
                });
                turnaroundHover.addEventListener("mousemove", (e) => {
                    moveZWLTooltip(e);
                });
                turnaroundHover.addEventListener("mouseout", () => {
                    resetUmlaufHighlight();
                    hideZWLTooltip();
                });
                
                svg.appendChild(turnaroundLine);
                svg.appendChild(turnaroundHover);
            }
        }
        
        // Build window.zwlUmlaufGroups
        const allTrainKeys = [];
        fahrplanData.directions.forEach((dir, dIdx) => {
            dir.trains.forEach(t => {
                if (isTrainRunningToday(t.restriction, simTime)) {
                    allTrainKeys.push(`${dIdx}_${t.id}`);
                }
            });
        });
        
        let remainingKeys = new Set(allTrainKeys);
        const localGroups = [];
        while (remainingKeys.size > 0) {
            const startKey = remainingKeys.values().next().value;
            const connected = getConnectedUmlaufTrains(startKey);
            localGroups.push([...connected]);
            connected.forEach(key => remainingKeys.delete(key));
        }
        
        function getUmlaufStartTime(groupKeys) {
            let minTime = Infinity;
            groupKeys.forEach(key => {
                const [dIdx, tId] = key.split("_");
                const dir = fahrplanData.directions[parseInt(dIdx)];
                const train = dir.trains.find(t => t.id === tId);
                if (train) {
                    train.times.forEach(ts => {
                        if (ts && ts !== '-') {
                            const m = timeToMinutes(ts);
                            if (m < minTime) minTime = m;
                        }
                    });
                }
            });
            return minTime;
        }
        localGroups.sort((a, b) => getUmlaufStartTime(a) - getUmlaufStartTime(b));
        window.zwlUmlaufGroups = localGroups;
        
        // Dynamisch den Tab-Button-Text anpassen
        const tabBtn = document.getElementById('umlauf-tab-btn');
        if (tabBtn) {
            tabBtn.innerText = localGroups.length === 1 ? 'Umlauf' : 'Umläufe';
        }
        
        // Rote Linie für aktuelle Zeit
        if (nowMins >= minMins && nowMins <= maxMins) {
            const currentY = getY(nowMins);
            
            const timeLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
            timeLine.setAttribute("x1", xStart);
            timeLine.setAttribute("y1", currentY);
            timeLine.setAttribute("x2", xEnd);
            timeLine.setAttribute("y2", currentY);
            timeLine.setAttribute("stroke", "#e74c3c");
            timeLine.setAttribute("stroke-width", "2");
            timeLine.setAttribute("stroke-dasharray", "2,2");
            svg.appendChild(timeLine);
            
            const bubbleLeft = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            bubbleLeft.setAttribute("x", xStart - 52);
            bubbleLeft.setAttribute("y", currentY - 9);
            bubbleLeft.setAttribute("width", "48");
            bubbleLeft.setAttribute("height", "18");
            bubbleLeft.setAttribute("rx", "4");
            bubbleLeft.setAttribute("fill", "#e74c3c");
            svg.appendChild(bubbleLeft);
            
            const bubbleLeftText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            bubbleLeftText.setAttribute("x", xStart - 28);
            bubbleLeftText.setAttribute("y", currentY + 4);
            bubbleLeftText.setAttribute("text-anchor", "middle");
            bubbleLeftText.setAttribute("font-size", "10");
            bubbleLeftText.setAttribute("font-weight", "bold");
            bubbleLeftText.setAttribute("fill", "white");
            bubbleLeftText.textContent = `${simTime.getHours().toString().padStart(2, '0')}.${simTime.getMinutes().toString().padStart(2, '0')}`;
            svg.appendChild(bubbleLeftText);
            
            const bubbleRight = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            bubbleRight.setAttribute("x", xEnd + 4);
            bubbleRight.setAttribute("y", currentY - 9);
            bubbleRight.setAttribute("width", "48");
            bubbleRight.setAttribute("height", "18");
            bubbleRight.setAttribute("rx", "4");
            bubbleRight.setAttribute("fill", "#e74c3c");
            svg.appendChild(bubbleRight);
            
            const bubbleRightText = document.createElementNS("http://www.w3.org/2000/svg", "text");
            bubbleRightText.setAttribute("x", xEnd + 28);
            bubbleRightText.setAttribute("y", currentY + 4);
            bubbleRightText.setAttribute("text-anchor", "middle");
            bubbleRightText.setAttribute("font-size", "10");
            bubbleRightText.setAttribute("font-weight", "bold");
            bubbleRightText.setAttribute("fill", "white");
            bubbleRightText.textContent = `${simTime.getHours().toString().padStart(2, '0')}.${simTime.getMinutes().toString().padStart(2, '0')}`;
            svg.appendChild(bubbleRightText);
        }
    }

    let umlaufTooltip = null;
    function showUmlaufTooltip(e, dIdx, trainId) {
        if (!umlaufTooltip) {
            umlaufTooltip = document.createElement('div');
            umlaufTooltip.style.position = 'absolute';
            umlaufTooltip.style.pointerEvents = 'none';
            umlaufTooltip.style.zIndex = '2000';
            document.body.appendChild(umlaufTooltip);
        }
        
        const dir = fahrplanData.directions[dIdx];
        const train = dir.trains.find(t => t.id === trainId);
        if (!train) return;
        
        const colors = ['#e67e22', '#3498db']; 
        const dirColor = colors[dIdx];
        
        umlaufTooltip.style.cssText = `
            position: absolute;
            background: rgba(255,255,255,0.95);
            padding: 8px;
            border-radius: 8px;
            border: 2px solid ${dirColor};
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            box-sizing: border-box;
            z-index: 2000;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            pointer-events: none;
            width: 260px;
        `;
        
        const desc = fahrplanData.restrictions ? (fahrplanData.restrictions[train.restriction] || "") : "";
        const restSpan = train.restriction ? `<span class="restriction-tag" title="${desc}" style="margin-left: 6px; font-size: 10px;">${train.restriction}</span>` : "";
        
        let html = `
            <div style="font-weight: bold; color: ${dirColor}; margin-bottom: 8px; font-size: 14px; user-select: none;">Zug ${train.id}${restSpan} <span style="color:#444; font-weight:normal;">nach ${dir.to}</span></div>
            <table style="width: 100%; border-collapse: collapse; font-size: 12px; text-align: left;">
                <tr style="border-bottom: 2px solid #ccc; color: #666; user-select: none;">
                    <th style="padding: 3px; text-align: left;">Ank.</th>
                    <th style="padding: 3px; text-align: left;">Abf.</th>
                    <th style="padding: 3px; text-align: left; padding-left: 8px;">Bahnhof</th>
                </tr>`;
                
        dir.stations.forEach((stationName, sIdx) => {
            const timeStr = train.times[sIdx];
            if (!timeStr || timeStr === '-') return;
            
            let ank = "", abf = "";
            if (timeStr.includes('/')) { 
                [ank, abf] = timeStr.split('/'); 
            } else { 
                if (sIdx === dir.stations.length - 1) ank = timeStr; else abf = timeStr; 
            }
            
            html += `<tr style="border-bottom: 1px solid #eee; color: #333;"><td style="padding: 4px 3px;">${ank}</td><td style="padding: 4px 3px;">${abf}</td><td style="padding: 4px 3px; text-align: left; padding-left: 8px;">${stationName}</td></tr>`;
        });
        
        html += `</table>`;
        umlaufTooltip.innerHTML = html;
        umlaufTooltip.style.display = 'block';
        moveUmlaufTooltip(e);
    }
    
    function moveUmlaufTooltip(e) {
        if (umlaufTooltip && umlaufTooltip.style.display === 'block') {
            umlaufTooltip.style.left = `${e.pageX + 15}px`;
            umlaufTooltip.style.top = `${e.pageY + 15}px`;
        }
    }
    
    function hideUmlaufTooltip() {
        if (umlaufTooltip) {
            umlaufTooltip.style.display = 'none';
        }
    }

    function renderActiveUmlaufBody(ud) {
        const body = document.getElementById('umlauf-card-body');
        if (!body) return;
        
        body.innerHTML = `
            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.88rem; white-space: nowrap;">
                    <thead>
                        <tr style="border-bottom: 2px solid #eee; color: #7f8c8d; font-weight: 700; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px;">
                            <th style="padding: 0.6rem 0; width: 28px; text-align: center;"></th>
                            <th style="padding: 0.6rem 0.6rem; padding-left: 8px; text-align: left; white-space: nowrap;">Zug</th>
                            <th style="padding: 0.6rem 0.6rem; text-align: left; white-space: nowrap;">Start</th>
                            <th style="padding: 0.6rem 0.6rem; text-align: left; white-space: nowrap;">Heiligendamm</th>
                            <th style="padding: 0.6rem 0.6rem; text-align: left; white-space: nowrap;">Ziel</th>
                            <th style="padding: 0.6rem 0.6rem; text-align: left; white-space: nowrap;">Dauer</th>
                            <th style="padding: 0.6rem 0.6rem; text-align: left; white-space: nowrap;">Wendezeit</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${ud.tableRows}
                    </tbody>
                </table>
            </div>
        `;
    }

    function renderUmlaeufe() {
        const container = document.getElementById('umlauf-container');
        if (!container) return;
        container.innerHTML = '';
        
        const tabBtn = document.getElementById('umlauf-tab-btn');
        if (tabBtn) {
            const count = window.zwlUmlaufGroups ? window.zwlUmlaufGroups.length : 0;
            tabBtn.innerText = count === 1 ? 'Umlauf' : 'Umläufe';
        }
        
        if (!window.zwlUmlaufGroups || window.zwlUmlaufGroups.length === 0) {
            // Falls ZWL noch nicht gezeichnet wurde, aufrufen
            drawZWL();
        }
        
        if (!window.zwlUmlaufGroups || window.zwlUmlaufGroups.length === 0) {
            container.innerHTML = '<div style="color: #666; font-style: italic; text-align: center;">Keine Zugumläufe für den aktuellen Tag vorhanden.</div>';
            return;
        }
        
        const dirColors = ['#e67e22', '#3498db'];
        let umlaufDataList = [];
        
        window.zwlUmlaufGroups.forEach((groupKeys, gIdx) => {
            let fahrten = [];
            
            groupKeys.forEach(key => {
                const [dIdxStr, tId] = key.split("_");
                const dIdx = parseInt(dIdxStr);
                const dir = fahrplanData.directions[dIdx];
                const train = dir.trains.find(t => t.id === tId);
                
                if (train) {
                    let firstIdx = -1;
                    let lastIdx = -1;
                    train.times.forEach((tVal, idx) => {
                        if (tVal && tVal !== '-') {
                            if (firstIdx === -1) firstIdx = idx;
                            lastIdx = idx;
                        }
                    });
                    
                    if (firstIdx !== -1 && lastIdx !== -1) {
                        const depTimeStr = train.times[firstIdx].replace(/[()]/g, '').split('/')[0];
                        const arrTimeStr = train.times[lastIdx].replace(/[()]/g, '').split('/').pop();
                        const depMins = timeToMinutes(train.times[firstIdx], 'dep');
                        const arrMins = timeToMinutes(train.times[lastIdx], 'arr');
                        
                        const hIdx = dir.stations.findIndex(s => s.includes("Heiligendamm"));
                        let hTimeStr = '-';
                        if (hIdx !== -1 && train.times[hIdx] && train.times[hIdx] !== '-') {
                            let clean = train.times[hIdx].replace(/[()]/g, '');
                            if (clean.includes('/')) {
                                const parts = clean.split('/');
                                hTimeStr = `${parts[0]} - ${parts[1]}`;
                            } else {
                                hTimeStr = clean;
                            }
                        }
                        
                        fahrten.push({
                            trainId: train.id,
                            dIdx,
                            dirColor: dirColors[dIdx],
                            from: dir.stations[firstIdx],
                            to: dir.stations[lastIdx],
                            depTimeStr,
                            arrTimeStr,
                            hTimeStr,
                            depMins,
                            arrMins,
                            duration: arrMins - depMins,
                            restriction: train.restriction
                        });
                    }
                }
            });
            
            fahrten.sort((a, b) => a.depMins - b.depMins);
            
            let tableRows = '';
            fahrten.forEach((f, fIdx) => {
                let wendezeitStr = '-';
                if (fIdx < fahrten.length - 1) {
                    const nextF = fahrten[fIdx + 1];
                    const wMins = nextF.depMins - f.arrMins;
                    wendezeitStr = `${wMins} min`;
                } else {
                    wendezeitStr = '<span style="color: #95a5a6; font-style: italic; font-size: 0.8rem;">Dienstende</span>';
                }
                
                let showRestr = f.restriction ? true : false;
                const desc = fahrplanData.restrictions ? (fahrplanData.restrictions[f.restriction] || "") : "";
                const restHtml = showRestr ? `<span class="restriction-tag" title="${desc}" style="background: #222; color: #fff; padding: 2px 5px; border-radius: 3px; font-size: 10px; display: inline-block; min-width: 12px; text-align: center;">${f.restriction}</span>` : ``;
                
                tableRows += `
                    <tr style="border-bottom: 1px solid #f2f2f2; transition: background 0.15s ease;" onmouseover="this.style.background='rgba(0,0,0,0.02)';" onmouseout="this.style.background='none';">
                        <td style="padding: 0.5rem 0; text-align: center;">${restHtml}</td>
                        <td style="padding: 0.5rem 0.6rem; padding-left: 8px; font-weight: bold; color: ${f.dirColor}; text-align: left; white-space: nowrap; cursor: pointer;" onmouseover="showUmlaufTooltip(event, ${f.dIdx}, '${f.trainId}')" onmousemove="moveUmlaufTooltip(event)" onmouseout="hideUmlaufTooltip()">Zug ${f.trainId}</td>
                        <td style="padding: 0.5rem 0.6rem; color: #333; text-align: left; white-space: nowrap;"><strong>${f.depTimeStr}</strong> <span style="font-weight: normal; color: #555; margin-left: 4px;">${f.from}</span></td>
                        <td style="padding: 0.5rem 0.6rem; color: #333; text-align: left; font-weight: 500; white-space: nowrap;">${f.hTimeStr}</td>
                        <td style="padding: 0.5rem 0.6rem; color: #333; text-align: left; white-space: nowrap;"><strong>${f.arrTimeStr}</strong> <span style="font-weight: normal; color: #555; margin-left: 4px;">${f.to}</span></td>
                        <td style="padding: 0.5rem 0.6rem; color: #666; font-weight: 500; text-align: left; white-space: nowrap;">${f.duration} min</td>
                        <td style="padding: 0.5rem 0.6rem; font-weight: 600; color: #27ae60; text-align: left; white-space: nowrap;">${wendezeitStr}</td>
                    </tr>
                `;
            });
            
            const totalFahrzeit = fahrten.reduce((sum, f) => sum + f.duration, 0);
            const tfHrs = Math.floor(totalFahrzeit / 60);
            const tfMins = totalFahrzeit % 60;
            const fahrzeitTimeStr = `${tfHrs}h ${tfMins}min reine Fahrzeit`;
            
            let einsatzTimeStr = '-';
            if (fahrten.length > 0) {
                const startMins = fahrten[0].depMins;
                const endMins = fahrten[fahrten.length - 1].arrMins;
                const einsatzMins = endMins - startMins;
                const hrs = Math.floor(einsatzMins / 60);
                const mins = einsatzMins % 60;
                einsatzTimeStr = `${hrs}h ${mins}min`;
            }
            
            umlaufDataList.push({
                gIdx,
                fahrten,
                tableRows,
                totalFahrzeit,
                fahrzeitTimeStr,
                einsatzTimeStr
            });
        });
        
        // Einzelne Karte als Container erstellen
        const card = document.createElement('div');
        card.className = 'card';
        card.style.cssText = 'margin-bottom: 1rem; padding: 0; border: 1px solid rgba(0,0,0,0.06); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); overflow: hidden;';
        
        const cardHeader = document.createElement('div');
        cardHeader.style.cssText = 'background: #fdfdfd; padding: 0.8rem 1rem; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem;';
        
        // Left Area: Sub-tabs navigation on the left
        const leftArea = document.createElement('div');
        leftArea.id = 'umlauf-header-left';
        cardHeader.appendChild(leftArea);
        
        // Right Area: Active Umlauf statistics on the right
        const rightArea = document.createElement('div');
        rightArea.id = 'umlauf-header-right';
        cardHeader.appendChild(rightArea);
        
        card.appendChild(cardHeader);
        
        const cardBody = document.createElement('div');
        cardBody.id = 'umlauf-card-body';
        cardBody.style.cssText = 'padding: 0.8rem;';
        card.appendChild(cardBody);
        
        container.appendChild(card);
        
        // Helper to update stats on the right side
        function updateHeaderStats(ud) {
            rightArea.innerHTML = `
                <div style="display: flex; gap: 0.8rem; font-size: 0.8rem; color: #666; font-weight: 500;">
                    <span style="background: rgba(0,0,0,0.04); padding: 2px 6px; border-radius: 4px;">${ud.fahrten.length} ${ud.fahrten.length === 1 ? 'Fahrt' : 'Fahrten'}</span>
                    <span style="background: rgba(0,0,0,0.04); padding: 2px 6px; border-radius: 4px;">${ud.fahrzeitTimeStr}</span>
                    <span style="background: rgba(0,0,0,0.04); padding: 2px 6px; border-radius: 4px;">Im Einsatz ${ud.einsatzTimeStr}</span>
                </div>
            `;
        }
        
        // Build sub-tabs container in leftArea (acts as both navigation and heading)
        const subNav = document.createElement('div');
        subNav.className = 'sub-tabs';
        subNav.style.margin = '0';
        subNav.style.display = 'flex';
        
        umlaufDataList.forEach((ud, idx) => {
            const btn = document.createElement('button');
            btn.className = `sub-tab-btn umlauf-sub-tab-btn ${idx === 0 ? 'active' : ''}`;
            btn.innerText = `Umlauf ${idx + 1}`;
            if (window.zwlUmlaufGroups.length > 1) {
                btn.onclick = (e) => {
                    document.querySelectorAll('.umlauf-sub-tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderActiveUmlaufBody(ud);
                    updateHeaderStats(ud);
                };
            } else {
                btn.style.cursor = 'default';
            }
            subNav.appendChild(btn);
        });
        leftArea.appendChild(subNav);
        
        // Initial render of first active Umlauf
        renderActiveUmlaufBody(umlaufDataList[0]);
        updateHeaderStats(umlaufDataList[0]);
    }

    function showTab(tabId) {
        if (typeof hideZWLTooltip === 'function') hideZWLTooltip();
        if (typeof hideUmlaufTooltip === 'function') hideUmlaufTooltip();
        
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        
        const timeControls = document.getElementById('time-controls-container');
        if (['bildfahrplan', 'umlauf', 'strecke'].includes(tabId)) {
            timeControls.style.display = 'flex';
        } else {
            timeControls.style.display = 'none';
        }
        
        if (tabId === 'strecke') renderRoute();
        if (tabId === 'bildfahrplan') {
            drawZWL();
            setTimeout(scrollToCurrentTime, 100);
        }
        if (tabId === 'umlauf') {
            renderUmlaeufe();
        }
        if (tabId === 'hilfe') {
            loadHelp();
        }
    }

    init();
</script>
</body>
</html>
