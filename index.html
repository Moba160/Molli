<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molli Fahrplan 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b0000;
            --secondary: #f4e1d2;
            --accent: #d4af37;
            --text: #333;
            --bg: #fafafa;
            --white: #ffffff;
            --highlight: #2ecc71;
            --shadow: rgba(0,0,0,0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #b00000);
            color: var(--white);
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 10px var(--shadow);
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--secondary);
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            background: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            color: #777;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .content-section {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px var(--shadow);
        }

        h2 {
            margin-bottom: 1rem;
            color: var(--primary);
            border-left: 5px solid var(--primary);
            padding-left: 1rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .info-item h4 {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        th, td {
            padding: 0.75rem;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: var(--secondary);
            color: var(--primary);
            position: sticky;
            top: 0;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .next-train {
            background-color: var(--highlight) !important;
            color: white;
            font-weight: bold;
            border-radius: 4px;
        }

        .restriction-tag {
            font-size: 0.7rem;
            background: var(--secondary);
            padding: 2px 4px;
            border-radius: 3px;
            margin-left: 4px;
        }

        @media (max-width: 600px) {
            th, td {
                padding: 0.5rem 0.25rem;
                font-size: 0.8rem;
            }
            .card { padding: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Molli Bäderbahn</h1>
    <p>Fahrplan & Informationen 2026</p>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('fahrplan')">Fahrplan</button>
        <button class="tab-btn" onclick="showTab('strecke')">Strecke</button>
        <button class="tab-btn" onclick="showTab('tarife')">Tarife</button>
    </div>

    <div id="fahrplan" class="content-section active">
        <div class="card">
            <h2>Gültigkeit</h2>
            <p id="validity-text">Lädt...</p>
        </div>

        <div id="timetable-container"></div>
    </div>

    <div id="strecke" class="content-section">
        <div class="card">
            <h2>Streckenverlauf</h2>
            <div id="map-container" style="width: 100%; height: 500px; background: #eee; border-radius: 8px; position: relative; overflow: hidden;">
                <svg id="route-svg" width="100%" height="100%" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
                    <g id="svg-content"></g>
                </svg>
            </div>
            <p style="margin-top: 1rem; font-size: 0.9rem; color: #666;">Visualisierung basierend auf geografischen Koordinaten.</p>
        </div>
    </div>

    <div id="tarife" class="content-section">
        <div class="card">
            <h2>Tarife & Zonen</h2>
            <div id="fares-content" class="info-grid"></div>
        </div>
    </div>
</div>

<script>
    let fahrplanData = null;
    let bfData = null;

    async function init() {
        try {
            const [fpRes, bfRes] = await Promise.all([
                fetch('data/fahrplan.json'),
                fetch('data/bf.json')
            ]);
            fahrplanData = await fpRes.json();
            bfData = await bfRes.json();
            
            renderData();
            renderRoute();
            updateHighlighting();
            setInterval(updateHighlighting, 60000);
        } catch (e) {
            console.error("Fehler beim Laden der Daten:", e);
        }
    }

    function renderData() {
        if (!fahrplanData) return;

        document.getElementById('validity-text').innerText = fahrplanData.validity;

        const container = document.getElementById('timetable-container');
        container.innerHTML = '';

        fahrplanData.directions.forEach(dir => {
            const section = document.createElement('div');
            section.className = 'card';
            
            let html = `<h2>${dir.from} &rarr; ${dir.to}</h2>`;
            html += `<div style="overflow-x: auto;"><table><thead><tr><th>Station</th>`;
            
            dir.trains.forEach(t => {
                html += `<th>Zug ${t.id}${t.restriction ? `<span class="restriction-tag">${t.restriction}</span>` : ''}</th>`;
            });
            
            html += `</tr></thead><tbody>`;
            
            dir.stations.forEach((station, sIdx) => {
                html += `<tr><td><strong>${station}</strong></td>`;
                dir.trains.forEach(t => {
                    const time = t.times[sIdx];
                    html += `<td data-time="${time}">${time}</td>`;
                });
                html += `</tr>`;
            });
            
            html += `</tbody></table></div>`;
            section.innerHTML = html;
            container.appendChild(section);
        });

        const faresContainer = document.getElementById('fares-content');
        const fares = fahrplanData.fares;
        faresContainer.innerHTML = `
            <div class="info-item">
                <h4>Kurzstrecke</h4>
                <p>${fares.short.toFixed(2)} €</p>
            </div>
            <div class="info-item">
                <h4>2 Zonen</h4>
                <p>Einfach: ${fares.zone2.single.toFixed(2)} € / Rück: ${fares.zone2.return.toFixed(2)} €</p>
            </div>
            <div class="info-item">
                <h4>3 Zonen</h4>
                <p>Einfach: ${fares.zone3.single.toFixed(2)} € / Rück: ${fares.zone3.return.toFixed(2)} €</p>
            </div>
        `;
    }

    function renderRoute() {
        if (!bfData) return;
        
        const svgContent = document.getElementById('svg-content');
        svgContent.innerHTML = '';
        
        // Min/Max finden für Skalierung
        const lats = bfData.map(b => b.lat);
        const lngs = bfData.map(b => b.lng);
        const minLat = Math.min(...lats);
        const maxLat = Math.max(...lats);
        const minLng = Math.min(...lngs);
        const maxLng = Math.max(...lngs);
        
        const padding = 50;
        const width = 1000 - 2 * padding;
        const height = 600 - 2 * padding;
        
        const project = (lat, lng) => {
            const x = padding + (lng - minLng) / (maxLng - minLng) * width;
            // Latitude ist umgekehrt im SVG (y=0 ist oben)
            const y = padding + (1 - (lat - minLat) / (maxLat - minLat)) * height;
            return { x, y };
        };

        // Linie zeichnen
        let pathData = "";
        bfData.forEach((bf, i) => {
            const { x, y } = project(bf.lat, bf.lng);
            pathData += (i === 0 ? "M" : " L") + `${x},${y}`;
        });
        
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", pathData);
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", "var(--primary)");
        path.setAttribute("stroke-width", "4");
        path.setAttribute("stroke-linejoin", "round");
        svgContent.appendChild(path);
        
        // Bahnhöfe zeichnen
        bfData.forEach(bf => {
            const { x, y } = project(bf.lat, bf.lng);
            
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", x);
            circle.setAttribute("cy", y);
            circle.setAttribute("r", "8");
            circle.setAttribute("fill", "var(--primary)");
            svgContent.appendChild(circle);
            
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x);
            text.setAttribute("y", y - 15);
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("font-size", "14");
            text.setAttribute("font-weight", "600");
            text.setAttribute("fill", "var(--text)");
            text.textContent = bf.name;
            svgContent.appendChild(text);
        });
    }

    function updateHighlighting() {
        const now = new Date();
        const nowMinutes = now.getHours() * 60 + now.getMinutes();

        document.querySelectorAll('td[data-time]').forEach(td => {
            td.classList.remove('next-train');
            const timeStr = td.getAttribute('data-time');
            if (timeStr && timeStr !== '-') {
                const [h, m] = timeStr.split(':').map(Number);
                const trainMinutes = h * 60 + m;
                const diff = trainMinutes - nowMinutes;

                // Innerhalb der nächsten 10 Minuten in der Zukunft
                if (diff >= 0 && diff <= 10) {
                    td.classList.add('next-train');
                }
            }
        });
    }

    function showTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    init();
</script>

</body>
</html>
