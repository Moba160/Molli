<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molli Fahrplan 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b0000;
            --secondary: #f4e1d2;
            --accent: #d4af37;
            --text: #333;
            --bg: #fafafa;
            --white: #ffffff;
            --highlight: #2ecc71;
            --shadow: rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #b00000);
            color: var(--white);
            padding: 1.5rem 1rem;
            text-align: center;
            box-shadow: 0 4px 10px var(--shadow);
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--secondary);
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            background: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            color: #777;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        .content-section {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px var(--shadow);
        }

        h2 {
            margin-bottom: 1rem;
            color: var(--primary);
            border-left: 5px solid var(--primary);
            padding-left: 1rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .info-item h4 {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.9rem;
        }

        th, td {
            padding: 0.75rem;
            text-align: center;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: var(--secondary);
            color: var(--primary);
            position: sticky;
            top: 0;
        }

        tr:hover { background-color: #f9f9f9; }

        .next-train {
            background-color: var(--highlight) !important;
            color: white;
            font-weight: bold;
            border-radius: 4px;
        }

        .restriction-tag {
            font-size: 0.7rem;
            background: var(--secondary);
            padding: 2px 4px;
            border-radius: 3px;
            margin-left: 4px;
        }

        @media (max-width: 600px) {
            th, td { padding: 0.5rem 0.25rem; font-size: 0.8rem; }
            .card { padding: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; padding: 0 1rem;">
        <div style="text-align: left;">
            <h1>Molli Bäderbahn</h1>
            <p id="validity-header" style="font-size: 0.9rem; opacity: 0.8;">Lädt Fahrplan...</p>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.2); padding: 0.5rem 1rem; border-radius: 8px;">
            <span style="font-size: 0.8rem;">Speed:</span>
            <select id="time-scale" style="background: transparent; color: white; border: none; font-weight: 600; cursor: pointer;">
                <option value="1" style="color: black;">1x</option>
                <option value="10" style="color: black;">10x</option>
                <option value="20" style="color: black;">20x</option>
            </select>
            <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.3); margin: 0 5px;"></div>
            <span style="font-size: 0.8rem; font-weight: 400;">Sim-Zeit:</span>
            <input type="time" id="sim-time-input" style="font-family: inherit; font-size: 1.2rem; font-weight: 600; border: none; background: transparent; color: white; cursor: pointer;">
        </div>
    </div>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn" onclick="showTab('fahrplan')">Fahrplan</button>
        <button class="tab-btn active" onclick="showTab('strecke')">Strecke</button>
        <button class="tab-btn" onclick="showTab('tarife')">Tarife</button>
    </div>

    <div id="fahrplan" class="content-section">
        <div id="timetable-container"></div>
    </div>

    <div id="strecke" class="content-section active">
        <div class="card">
            <div id="map-container" style="width: 100%; height: 500px; background: #f0f0f0; border-radius: 12px; position: relative; overflow: hidden; box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);">
                <svg id="route-svg" width="100%" height="100%" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet">
                    <g id="svg-route-line"></g>
                    <g id="svg-stations"></g>
                    <g id="svg-trains"></g>
                    <g id="svg-labels"></g>
                    <g id="svg-train-times"></g>
                    <g id="svg-user-location"></g>
                    <g id="svg-train-list"></g>
                </svg>
            </div>
            <p style="margin-top: 1rem; font-size: 0.8rem; color: #888;">* Der Standort wird bei Freigabe angezeigt. Die Karte wird live aktualisiert.</p>
        </div>
    </div>

    <div id="tarife" class="content-section">
        <div class="card">
            <div id="fares-content" class="info-grid"></div>
        </div>
    </div>
</div>

<script>
    let fahrplanData = null;
    let bfData = null;
    let projectedStations = [];
    let mapBounds = { minLat: 0, maxLat: 0, minLng: 0, maxLng: 0 };
    
    let baseSimTime = new Date();
    let realTimeAtSet = Date.now();
    let timeScale = 1;
    let updateInterval = null;

    async function init() {
        try {
            const [fpRes, bfRes] = await Promise.all([
                fetch('data/fahrplan.json'),
                fetch('data/bf.json')
            ]);
            fahrplanData = await fpRes.json();
            bfData = await bfRes.json();
            
            const timeInput = document.getElementById('sim-time-input');
            const scaleSelect = document.getElementById('time-scale');
            const now = new Date();
            timeInput.value = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            timeInput.addEventListener('change', (e) => {
                const [h, m] = e.target.value.split(':').map(Number);
                const newSim = new Date();
                newSim.setHours(h, m, 0, 0);
                baseSimTime = newSim;
                realTimeAtSet = Date.now();
                updateLive();
            });

            scaleSelect.addEventListener('change', (e) => {
                // Jetzige Sim-Zeit einfrieren und als neue Basis nehmen
                const currentSim = getSimTime();
                baseSimTime = currentSim;
                realTimeAtSet = Date.now();
                timeScale = parseInt(e.target.value);
                startInterval();
                updateLive();
            });

            initGeolocation();
            renderData();
            updateLive();
            startInterval();
        } catch (e) {
            console.error("Fehler beim Laden der Daten:", e);
        }
    }

    function startInterval() {
        if (updateInterval) clearInterval(updateInterval);
        const ms = timeScale > 1 ? 1000 : 30000;
        updateInterval = setInterval(updateLive, ms);
    }

    function project(lat, lng) {
        const padding = 60;
        const width = 1000 - 2 * padding, height = 600 - 2 * padding;
        const x = padding + (lng - mapBounds.minLng) / (mapBounds.maxLng - mapBounds.minLng) * width;
        const y = padding + (1 - (lat - mapBounds.minLat) / (mapBounds.maxLat - mapBounds.minLat)) * height;
        return { x, y };
    }

    function initGeolocation() {
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition(position => {
                const { latitude, longitude } = position.coords;
                renderUserLocation(latitude, longitude);
            }, err => console.warn("Geolocation Fehler:", err), { enableHighAccuracy: true });
        }
    }

    function renderUserLocation(lat, lng) {
        const group = document.getElementById('svg-user-location');
        if (!group || !mapBounds.minLat) return;
        group.innerHTML = '';
        const { x, y } = project(lat, lng);
        const pulse = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        pulse.setAttribute("cx", x); pulse.setAttribute("cy", y);
        pulse.setAttribute("r", "12"); pulse.setAttribute("fill", "#3498db"); pulse.setAttribute("opacity", "0.4");
        const anim = document.createElementNS("http://www.w3.org/2000/svg", "animate");
        anim.setAttribute("attributeName", "r"); anim.setAttribute("values", "10;20;10");
        anim.setAttribute("dur", "2s"); anim.setAttribute("repeatCount", "indefinite");
        pulse.appendChild(anim);
        group.appendChild(pulse);
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", x); circle.setAttribute("cy", y);
        circle.setAttribute("r", "8"); circle.setAttribute("fill", "#2980b9");
        circle.setAttribute("stroke", "white"); circle.setAttribute("stroke-width", "2");
        group.appendChild(circle);
    }

    function getSimTime() {
        const elapsedReal = Date.now() - realTimeAtSet;
        return new Date(baseSimTime.getTime() + elapsedReal * timeScale);
    }

    function updateLive() {
        const simTime = getSimTime();
        const timeInput = document.getElementById('sim-time-input');
        if (document.activeElement !== timeInput) {
            timeInput.value = simTime.getHours().toString().padStart(2, '0') + ":" + simTime.getMinutes().toString().padStart(2, '0');
        }
        renderRoute();
        renderTrains(simTime);
        updateHighlighting(simTime);
    }

    function renderData() {
        if (!fahrplanData) return;
        document.getElementById('validity-header').innerText = fahrplanData.validity;
        const container = document.getElementById('timetable-container');
        container.innerHTML = '';
        fahrplanData.directions.forEach(dir => {
            const section = document.createElement('div');
            section.className = 'card';
            let html = `<h2>${dir.from} &rarr; ${dir.to}</h2><div style="overflow-x: auto;"><table><thead><tr><th>Station</th>`;
            dir.trains.forEach(t => html += `<th>Zug ${t.id}${t.restriction ? `<span class="restriction-tag">${t.restriction}</span>` : ''}</th>`);
            html += `</tr></thead><tbody>`;
            dir.stations.forEach((station, sIdx) => {
                html += `<tr><td><strong>${station}</strong></td>`;
                dir.trains.forEach(t => html += `<td data-time="${t.times[sIdx]}">${t.times[sIdx]}</td>`);
                html += `</tr>`;
            });
            html += `</tbody></table></div>`;
            section.innerHTML = html; container.appendChild(section);
        });
        const fares = fahrplanData.fares;
        document.getElementById('fares-content').innerHTML = `
            <div class="info-item"><h4>Kurzstrecke</h4><p>${fares.short.toFixed(2)} €</p></div>
            <div class="info-item"><h4>2 Zonen</h4><p>Einfach: ${fares.zone2.single.toFixed(2)} € / Rück: ${fares.zone2.return.toFixed(2)} €</p></div>
            <div class="info-item"><h4>3 Zonen</h4><p>Einfach: ${fares.zone3.single.toFixed(2)} € / Rück: ${fares.zone3.return.toFixed(2)} €</p></div>
        `;
    }

    function renderRoute() {
        if (!bfData) return;
        const svgLine = document.getElementById('svg-route-line');
        const svgStations = document.getElementById('svg-stations');
        const svgLabels = document.getElementById('svg-labels');
        svgLine.innerHTML = ''; svgStations.innerHTML = ''; svgLabels.innerHTML = '';
        const lats = bfData.map(b => b.lat), lngs = bfData.map(b => b.lng);
        mapBounds = { minLat: Math.min(...lats), maxLat: Math.max(...lats), minLng: Math.min(...lngs), maxLng: Math.max(...lngs) };
        projectedStations = bfData.map(bf => {
            const { x, y } = project(bf.lat, bf.lng);
            return { ...bf, x, y };
        });
        let pathData = "";
        projectedStations.forEach((bf, i) => pathData += (i === 0 ? "M" : " L") + `${bf.x},${bf.y}`);
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", pathData); path.setAttribute("fill", "none");
        path.setAttribute("stroke", "#ccc"); path.setAttribute("stroke-width", "6"); path.setAttribute("stroke-linecap", "round");
        svgLine.appendChild(path);
        projectedStations.forEach((bf, i) => {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", bf.x); circle.setAttribute("cy", bf.y); circle.setAttribute("r", "7"); circle.setAttribute("fill", "#666");
            svgStations.appendChild(circle);
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", bf.x); text.setAttribute("y", bf.y + (i % 2 === 0 ? -20 : 30));
            text.setAttribute("text-anchor", "middle"); text.setAttribute("font-size", "12");
            text.setAttribute("font-weight", "600"); text.setAttribute("fill", "#444");
            text.textContent = bf.name; svgLabels.appendChild(text);
        });
    }

    function timeToMinutes(timeStr) {
        if (!timeStr || timeStr === '-') return null;
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function isTrainRunningToday(restriction, simDate) {
        if (!restriction) return true;
        const day = simDate.getDay(); 
        return restriction === 'A' ? (day >= 1 && day <= 5) : true;
    }

    function renderTrains(simTime) {
        if (!fahrplanData || projectedStations.length === 0) return;
        const svgTrains = document.getElementById('svg-trains');
        const svgTrainTimes = document.getElementById('svg-train-times');
        const svgTrainList = document.getElementById('svg-train-list');
        svgTrains.innerHTML = ''; svgTrainTimes.innerHTML = ''; svgTrainList.innerHTML = '';
        const nowMins = simTime.getHours() * 60 + simTime.getMinutes();
        const kwWest = projectedStations.find(s => s.name === "Kühlungsborn West");
        
        const colors = ['#e67e22', '#3498db']; // Orange für KW->BD, Blau für BD->KW
        
        // Listen-Anker weiter nach unten verschieben
        let listX = kwWest.x - 40, listY = kwWest.y + 130;
        
        const title = document.createElementNS("http://www.w3.org/2000/svg", "text");
        title.setAttribute("x", listX); title.setAttribute("y", listY);
        title.setAttribute("font-size", "18"); title.setAttribute("font-weight", "bold");
        title.setAttribute("fill", varProp('--primary')); title.textContent = "Aktive Züge:";
        svgTrainList.appendChild(title); listY += 25;
        
        let activeTrainsCount = 0;
        let futureTrains = [];

        fahrplanData.directions.forEach((dir, dIdx) => {
            const isToDoberan = dIdx === 0;
            const dirColor = colors[dIdx];

            dir.trains.forEach(train => {
                if (!isTrainRunningToday(train.restriction, simTime)) return;
                const times = train.times.map(timeToMinutes);
                let startIdx = -1, endIdx = -1;
                for(let i=0; i<times.length; i++) if(times[i] !== null) { if(startIdx === -1) startIdx = i; endIdx = i; }
                
                // Falls der Zug noch nicht fährt, für "Nächste Züge" sammeln
                if (nowMins < times[startIdx]) {
                    futureTrains.push({ train, dir, dIdx, startTime: times[startIdx], startNode: dir.stations[startIdx], timeStr: train.times[startIdx] });
                }

                if(nowMins < times[startIdx] || nowMins > times[endIdx]) return;
                
                let legStart = -1, legEnd = -1;
                for(let i=0; i<times.length - 1; i++) if(times[i] !== null && times[i+1] !== null) if(nowMins >= times[i] && nowMins <= times[i+1]) { legStart = i; legEnd = i + 1; break; }
                
                if (legStart !== -1) {
                    activeTrainsCount++;
                    const p1 = projectedStations.find(s => s.name === dir.stations[legStart]);
                    const p2 = projectedStations.find(s => s.name === dir.stations[legEnd]);
                    const duration = times[legEnd] - times[legStart];
                    const factor = duration === 0 ? 0 : (nowMins - times[legStart]) / duration;
                    
                    const tx = p1.x + (p2.x - p1.x) * factor;
                    const ty = p1.y + (p2.y - p1.y) * factor;
                    
                    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
                    
                    let yOffset = 0;
                    if (dir.stations[legStart] === "Heiligendamm" || dir.stations[legEnd] === "Heiligendamm") {
                        yOffset = isToDoberan ? -12 : 12;
                    }

                    const triangle = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const size = 12;
                    const dPath = `M ${-size},${-size/1.5} L ${size},0 L ${-size},${size/1.5} Z`;
                    triangle.setAttribute("d", dPath);
                    triangle.setAttribute("fill", dirColor);
                    triangle.setAttribute("transform", `translate(${tx},${ty + yOffset}) rotate(${angle})`);
                    svgTrains.appendChild(triangle);

                    // Halt-Zeiten an den Bahnhöfen anzeigen
                    dir.stations.forEach((stationName, sIdx) => {
                        const timeStr = train.times[sIdx];
                        if (!timeStr || timeStr === '-') return;
                        const bf = projectedStations.find(s => s.name === stationName);
                        const timeLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        
                        // Optimierte Positionierung: Gleiche Höhe wie Bahnhofsname, nur horizontal versetzt
                        const xOffset = isToDoberan ? 100 : -100;
                        
                        timeLabel.setAttribute("x", bf.x + xOffset);
                        timeLabel.setAttribute("y", bf.y + 5); // Leichte Baseline-Korrektur
                        timeLabel.setAttribute("text-anchor", isToDoberan ? "start" : "end");
                        timeLabel.setAttribute("font-size", "11");
                        timeLabel.setAttribute("font-weight", "bold");
                        
                        // Farbe: Deutliches Grau für vorbei, Richtungsfarbe für anstehend
                        timeLabel.setAttribute("fill", times[sIdx] < nowMins ? "#bbb" : dirColor);
                        timeLabel.textContent = timeStr;
                        svgTrainTimes.appendChild(timeLabel);
                    });

                    const entry = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    entry.setAttribute("x", listX); entry.setAttribute("y", listY);
                    entry.setAttribute("font-size", "15"); entry.setAttribute("fill", "#333");
                    
                    const nextTime = train.times[legEnd];
                    
                    // Zug-Nummer farbig und fett
                    const tspanId = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                    tspanId.setAttribute("fill", dirColor);
                    tspanId.setAttribute("font-weight", "bold");
                    tspanId.textContent = `Zug ${train.id}`;
                    
                    entry.appendChild(tspanId);
                    entry.appendChild(document.createTextNode(`: nach ${dir.to} (Halt: ${dir.stations[legEnd]} um ${nextTime})`));
                    
                    svgTrainList.appendChild(entry); listY += 22;
                }
            });
        });

        if (activeTrainsCount === 0) {
            const none = document.createElementNS("http://www.w3.org/2000/svg", "text");
            none.setAttribute("x", listX); none.setAttribute("y", listY);
            none.setAttribute("font-size", "15"); none.setAttribute("fill", "#999");
            none.textContent = "Kein Zugverkehr"; svgTrainList.appendChild(none); listY += 22;
        }

        // Nächste Züge
        listY += 15;
        const nextTitle = document.createElementNS("http://www.w3.org/2000/svg", "text");
        nextTitle.setAttribute("x", listX); nextTitle.setAttribute("y", listY);
        nextTitle.setAttribute("font-size", "18"); nextTitle.setAttribute("font-weight", "bold");
        nextTitle.setAttribute("fill", varProp('--primary')); nextTitle.textContent = "Nächste Züge:";
        svgTrainList.appendChild(nextTitle); listY += 25;

        futureTrains.sort((a, b) => a.startTime - b.startTime);
        const nextTwo = futureTrains.slice(0, 2);

        if (nextTwo.length > 0) {
            nextTwo.forEach(ft => {
                const entry = document.createElementNS("http://www.w3.org/2000/svg", "text");
                entry.setAttribute("x", listX); entry.setAttribute("y", listY);
                entry.setAttribute("font-size", "15"); entry.setAttribute("fill", "#333");
                const tspanId = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
                tspanId.setAttribute("fill", colors[ft.dIdx]); tspanId.setAttribute("font-weight", "bold");
                tspanId.textContent = `Zug ${ft.train.id}`;
                entry.appendChild(tspanId);
                entry.appendChild(document.createTextNode(`: ab ${ft.startNode} um ${ft.timeStr} nach ${ft.dir.to}`));
                svgTrainList.appendChild(entry); listY += 22;
            });
        } else {
            const none = document.createElementNS("http://www.w3.org/2000/svg", "text");
            none.setAttribute("x", listX); none.setAttribute("y", listY);
            none.setAttribute("font-size", "15"); none.setAttribute("fill", "#999");
            none.textContent = "Keine weiteren Züge heute"; svgTrainList.appendChild(none);
        }
    }

    function varProp(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

    function updateHighlighting(simTime) {
        const nowMinutes = simTime.getHours() * 60 + simTime.getMinutes();
        document.querySelectorAll('td[data-time]').forEach(td => {
            td.classList.remove('next-train');
            const timeStr = td.getAttribute('data-time');
            if (timeStr && timeStr !== '-') {
                const [h, m] = timeStr.split(':').map(Number);
                const diff = (h * 60 + m) - nowMinutes;
                if (diff >= 0 && diff <= 10) td.classList.add('next-train');
            }
        });
    }

    function showTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if (tabId === 'strecke') renderRoute();
    }

    init();
</script>
</body>
</html>
