  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/93678_x.jpg
  text: '<b>Molli (11)</b><br>99 2324 mit MBB 14613 am Heiligendammer Einfahrsignal
    aus Richtung Bad Doberan. Bis Anfang der 1990er Jahre stand das Signal links vom
    Gleis. Zur besseren Erkennbarkeit wurde es - trotz der Gefährdung durch den Straßenverkehr
    - dann wieder auf die (richtige) Gleisseite versetzt. Seit 2008 ist es mit einem
    Negativsignalflügel ausgestattet. Im Hintergrund ist das Heiligendammer Grand-Hotel
    zu sehen, wo sich 2007 die Vertreter der damaligen G8-Staaten trafen.  (12.05.2023)
    <i>Foto: Zeno Pillmann</i>'
  datum: 12.05.2023
  quelle: Eisenbahnstiftung
