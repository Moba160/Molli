  text: '<b>99 303 in Bad Doberan</b><br>99 303 (Bw Rostock) im Bahnhof Bad Doberan.
    Die abgestellte Reservelok wurde für Carl Bellingrodt extra aus dem Lokschuppen
    gezogen. Die Großherzoglich Mecklenburgische Friedrich-Franz-Eisenbahn (MFFE)
