- foto: https://eisenbahnstiftung.de/images/bildergalerie/61648.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/61648_x.jpg
  text: '<b>Inselbahn Borkum (12)</b><br>Vom 14. bis 22. September 2019 weilte 99
    331 von der Mecklenburgischen Bäderbahn Molli auf Borkum. Während die zweiachsige
    Dampflok "BORKUM III" (links) mit Leichtöl befeuert wird und manchmal eher nach
    Pommesbude statt nach Dampflok riecht, verbreitete 99 331 wieder den typischen
    Kohleduft auf der Insel. (18.09.2019) <i>Foto: Joachim Schmidt</i>'
  datum: 18.09.2019
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/61650.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/61650_x.jpg
  text: '<b>Inselbahn Borkum (14)</b><br>Nach rund zweieinhalb Jahren Vorbereitungszeit
    war 99 331 der Bäderbahn Molli für gut eine Woche auf Borkum zu Gast. Ein längerer
    Aufenthalt war aus logistischen Gründen nicht möglich, da auch bei der Molli im
    Sommer Hochsaison herrschte und die Aktion immerhin acht Mitarbeiter der Molli
    für 3 Wochen erforderte. Hier trifft die "Neubaulok" der LKM Babelsberg aus dem
    Jahr 1951 auf den T 1 der Borkumer Kleinbahn, der noch aus der Vorkriegszeit stammt.
    (19.09.2019) <i>Foto: Joachim Schmidt</i>'
  datum: 19.09.2019
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/61652.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/61652_x.jpg
  text: '<b>Inselbahn Borkum (16)</b><br>Sichtlich Spaß hatte auch das Kühlungsborner
    Personal bei seinem Einsatz auf Borkum. Insgesamt acht Molli-Mitarbeiter waren
    an die Nordsee gekommen, um sich um den reibungslosen Betrieb der 99 331 zu kümmern.
    Gemeinsam mit dem Borkumer Personal absolvieren sie in den paar Tagen ein beachtliches
    Fahrtpensum auf der rund vier Kilometer langen Inselbahnstrecke. (19.09.2019)
    <i>Foto: Joachim Schmidt</i>'
  datum: 19.09.2019
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/61655.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/61655_x.jpg
  text: '<b>Inselbahn Borkum (19)</b><br>99 331 an der Wagenhalle der Borkumer Kleinbahn
    auf Borkum. Obwohl die eigentlich seltenen Spurweiten von 900 mm von Molli und
    Borkum perfekt zusammenpassten, mussten die Kupplungssysteme der Fahrzeuge vor
    dem ersten Einsatz noch angepasst werden. Während bei der Molli das bei Schmalspurbahnen
    übliche Mittelpuffer-Kupplungssystem verwendet wird, bedient man sich auf Borkum
    gleich zweier Systeme: Die neuen Züge seit 1993 sind mit leichter Scharfenbergkupplung,
    die alten mit Doppelpuffern und einfachen Ketten ausgerüstet. Damit 99 331 die
    historischen Borkumer Wagen ziehen konnte, wurden die gedeckten Güterwagen 33
    und 55 als Adapterwagen hergerichtet. Mit den Adapterwagen an jedem Zugende konnte
    99 331 umsetzen und in beide Fahrtrichtungen gekuppelt werden. (19.09.2019) <i>Foto:
    Joachim Schmidt</i>'
  datum: 19.09.2019
  quelle: Eisenbahnstiftung
