- foto: https://eisenbahnstiftung.de/images/bildergalerie/93682.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/93682_x.jpg
  text: '<b>Molli (15)</b><br>1938 schlossen sich die Orte Ostseebad Arendsee, Brunshaupten
    und Fulgen zum Ostseebad Kühlungsborn zusammen. Der heutige Bahnhof Ostseebad
    Kühlungsborn Ost trug bis dahin den Namen Brunshaupten. Ebenfalls in den 1930er
    Jahren erhielt die Station ein neues Empfangsgebäude. 99 2322 verlässt mit MBB
    14613 den Bahnhof Richtung Bad Doberan. (14.05.2023) <i>Foto: Zeno Pillmann</i>'
  datum: 14.05.2023
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/93683.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/93683_x.jpg
  text: '<b>Molli (16)</b><br>Der Bahnhof Kühlungsborn West ist seit Anfang der 1990er
    Jahre betrieblich nicht mehr besetzt. Das Einfahrsignal aus Richtung Kühlungsborn
    Mitte blieb aus Gründen der Traditionspflege am Originalstandort stehen und wurde
    durch ein weißes Kreuz ungültig gemacht. 99 2323 passiert mit dem Frühzug MBB
    14613 nach Bad Doberan den Bü an der Fritz-Reuter-Straße. (08.05.2023) <i>Foto:
    Zeno Pillmann</i>'
  datum: 08.05.2023
  quelle: Eisenbahnstiftung
