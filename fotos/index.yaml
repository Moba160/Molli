  text: '<b>Molli (10)</b><br>99 2324 mit MBB 14617 aus Ostseebad Kühlungsborn West
    in unmittelbarer Nähe der Ostseerennbahn, wo es einen zusätzlichen Bahnhof für
    Veranstaltungsverkehre gibt. Die Ostseerennbahn zwischen Heiligendamm und Bad
    Doberan ist die älteste Galopprennbahn auf dem europäischen Festland. Die ersten
    Pferderennen fanden hier 1804 auf freiem Feld statt. (07.05.2023) <i>Foto: Zeno
    Pillmann</i>'
  datum: 07.05.2023
  quelle: Eisenbahnstiftung
