- foto: https://eisenbahnstiftung.de/images/bildergalerie/93688.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/93688_x.jpg
  text: '<b>Molli (21)</b><br>Neben den 1932 für die Bäderbahn Bad Doberan – Kühlungsborn
    beschafften drei Lokomotiven der Baureihe 99.32 standen dort ab 1961 auch die
    von der SDAG Wismut übernommenen 99 331-333 im Einsatz. 99 333 wurde bereits 1968
    ausgemustert. Die 1995 abgestellte 99 332 wird in den Sommermonaten im Bahnhof
    Kühlungsborn West ausgestellt. Da die noch betriebsfähige 99 331 den Anforderungen
    des (Sommer-)Fahrplans nicht mehr gewachsen war, wurde eine weitere leistungsfähige
    Lok benötigt. Daher wurde eine Lok der Baureihe 99.32 (99 2324) im Jahr 2009 im
    Dampflokwerk Meiningen nachgebaut. Links wartet 99 2323 mit MBB 14615 auf Ausfahrt.
    (07.05.2023) <i>Foto: Zeno Pillmann</i>'
  datum: 07.05.2023
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/93689.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/93689_x.jpg
  text: '<b>Molli (22)</b><br>Die Bäderbahn Molli mit einer Spurweite von 900 mm bedient
    die 15 Kilometer lange Strecke von Bad Doberan über Heiligendamm nach dem Ostseebad
    Kühlungsborn. Sie wird vom Eisenbahnverkehrsunternehmen Mecklenburgische Bäderbahn
    Molli (MBB) betrieben. In der sommerlichen Hochsaison wird die Strecke tagsüber
    im Stundentakt mit zwei Zügen bedient, die sich jeweils in Heiligendamm kreuzen.
    Die Fahrzeit für die gesamte Strecke beträgt ca. 40 Minuten. Im Ostseebad Kühlungsborn
    West befindet sich auch der Lokbahnhof mit dem Heizhaus, in dem gerade 99 2322
    ihren Dienst antritt. (13.05.2023) <i>Foto: Zeno Pillmann</i>'
  datum: 13.05.2023
  quelle: Eisenbahnstiftung
