  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/82849_x.jpg
  text: '<b>99 311 in Arendsee</b><br>99 311 vom Bw Rostock steht als Reservelok im
    Lokbf Ostseebad Arendsee kalt abgestellt. Henschel in Cassel lieferte die Lok
    1923 für die 900 mm-spurige Bäderbahn Bad Doberan—Arendsee. Sie verfügte über
    die selten eingesetzte Zweikammer-Druckluftbremse von Knorr. Alle Radsätze wurden
    von vorn gebremst. Die Luftbehälter befanden sich unter dem Führerhaus und die
    Luftpumpe auf dem rechten Umlaufblech vor dem Wasserkasten. 99 311 wurde 1942
    an die Firma Rathjens in Naumburg/Saale für eine Baustelle in Dänemark vermietet.
    Sie kehrte nicht mehr zurück und wurde nach 1945 in Dänemark verschrottet.  (04.07.1933)
    <i>Foto: DLA Darmstadt (Bellingrodt)</i>'
  datum: ''
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/82850.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/82850_x.jpg
  text: '<b>99 312 in Bad Doberan</b><br>Für die mecklenburgische Bäderbahn wurden
    1923/24 drei Lokomotiven der Gattung T 42 beschafft und als 99 311–313 in Dienst
    gestellt. Sie lösten dort die 1910 gelieferten Lokomotiven der Gattung T 7 ab,
    die den gestiegenen Anforderungen nicht mehr gewachsen waren. Nach Lieferung der
    neuen Einheitsloks der Baureihe 99³² im Jahre 1933 wurden sie in den Reservestand
    versetzt, versahen untergeordnete Dienste oder wurden als Heizlok vermietet. Das
    Bild zeigt 99 312 (Bw Rostock) bereits als Reservelok in Bad Doberan abgestellt.
    1961 wurde sie an den VEB Bauunion Rostock als Heizlok verkauft. (04.07.1933)
    <i>Foto: DLA Darmstadt (Bellingrodt)</i>'
  datum: ''
  quelle: Eisenbahnstiftung
