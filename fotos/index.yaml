  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/96377_x.jpg
  text: '<b>Molli (27)</b><br>Die 1995 gegründete Mecklenburgische Bäderbahn Molli
    (MBB) gehört anteilig dem Landkreis Rostock (64 %), der Stadt Bad Doberan (19,7
    %), dem Ostseebad Kühlungsborn (14,8 %) sowie einer natürlichen Person (1,5 %).
    Die Gesellschaft hat ihren Sitz in Bad Doberan, wo auch 99 2322 erwischt wurde.
    (05.10.2023) <i>Foto: Thorsten Eichhorn</i>'
  datum: 05.10.2023
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/96896.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/96896_x.jpg
  text: '<b>99 321 in Bad Doberan (3)</b><br>Die heute noch vorhandene Ortsdurchfahrt
    der Bäderbahn Molli in Bad Doberan war schon immer eine Herausforderung für Lokpersonal
    und Anwohner. Hier zwängt sich der P 4609 zum Ostseebad Kühlungsborn durch die
    Ernst-Thälmann-Straße. (24.08.1966) <i>Foto: Gerd Wolff</i>'
  datum: 24.08.1966
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/96901.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/96901_x.jpg
  text: '<b>99 321 in Kühlungsborn (1)</b><br>1932 ließ die Deutsche Reichsbahn die
    deutlich größeren, schnelleren und stärkeren Loks der Baureihe 99.32 (99 321–323)
    speziell für die Bäderbahn Molli bauen. Die drei Loks sind heute noch unter den
    Nummern 99 2321-0, 99 2322-8 und 99 2323-6 im Einsatz. Hier restauriert 99 321
    in Kühlungsborn West. (24.08.1966) <i>Foto: Gerd Wolff</i>'
  datum: 24.08.1966
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/96902.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/96902_x.jpg
  text: '<b>99 321 in Kühlungsborn (2)</b><br>1910 entstanden in Ostseebad Kühlungsborn
    West die Lokbehandlungsanlagen und ein zweiständiger Lokschuppen der damaligen
    Großherzoglich Mecklenburgischen Friedrich-Franz-Eisenbahn. 1915 wurden die Anlagen
    um eine Wagenhalle ergänzt. Seit 1. April 1920 gehörte die ''Molli'' zur Deutschen
    Reichsbahn. Die Reichsbahn vergrößerte 1933 den Lokschuppen auf vier Stände mit
    zweiflügligen Holztoren.  (24.08.1966) <i>Foto: Gerd Wolff</i>'
  datum: 24.08.1966
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/96903.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/96903_x.jpg
  text: '<b>Wagen 990-003</b><br>1930 lieferte die Waggonfabrik Wismar vier moderne
    und komfortable Reisezugwagen für den ''Molli''. Die Einstiegsbühnen waren jetzt
    geschlossen, und Polstersitze sorgten für mehr Komfort. Die Drehgestelle besaßen
    zudem zusätzliche Schraubenfedern. Die Reichsbahn der DDR setzte die Wagen in
    der 1. Klasse ein, obwohl beim ''Molli'' nur Züge mit Wagen der 2. Klasse verkehrten.
    Der KA4i-Wagen 990-003 steht hier vor dem Empfangsgebäude in Ostseebad Kühlungsborn
    West. (24.08.1966) <i>Foto: Gerd Wolff</i>'
  datum: 24.08.1966
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/96909.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/96909_x.jpg
  text: '<b>OOw-Wagen in Bad Doberan</b><br>Wie auf der normalspurigen Reichsbahn
    war auch auf dem ''Molli'' die Braunkohle der Hausbrandversorgung das am häufigsten
    transportierte Ladegut. Im Bahnhof Bad Doberan stehen die beladenen Oow-Wagen
    99-03-18 (Bj. 1915), 98-02-51 (Bj. 1915), 98-03-07 (Bj. 1914) und 98-03-02 (Bj.
    1922). (24.08.1966) <i>Foto: Gerd Wolff</i>'
  datum: 24.08.1966
  quelle: Eisenbahnstiftung
