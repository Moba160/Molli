  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/40220_x.jpg
  text: '<b>Führerhaus der 99 321</b><br>99 321, die 1932 speziell für den Einsatz
    auf der Bäderbahn Bad Doberan - Heiligendamm - Ostseebad Kühlungsborn gebaut wurde
    und dort bis heute im Einsatz ist. 1970 erhielt die die EDV-Nummer 99 2321-0,
    in Zeiten der DB AG war sie 1994/95 sogar als 099 901-1 unterwegs. (24.08.1966)
    <i>Foto: Joachim Claus</i>'
  datum: 24.08.1966
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/40221.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/40221_x.jpg
  text: '<b>Führerhaus der 99 333</b><br>99 333 war - wie das Fabrikschild unzweifelhaft
    ausweist - ein DDR-Neubau aus dem Jahr 1950. Sie war speziell für den Einsatz
    bei Industriebetrieben entwickelt worden und so kam sie zunächst zur SDAG Wismut
    nach Karl-Marx-Stadt. Ende der 1950er Jahre sah sich die Reichsbahn veranlasst,
    die 27 Jahre alten Lokomotiven der Baureihe 99.31 auf der Schmalspurbahn Bad Doberan
    - Kühlungsborn zu ersetzen. Ein Nachbau der Baureihe 99.32 war nicht möglich.
    So erwarb die Reichsbahn drei Werkloks von der SDAG Wismut. Nach Anpassungsarbeiten
    im Reichsbahnausbesserungswerk Görlitz kam die ehemalige Werklok 1 als 99 333
    im Dezember 1960 an die Ostsee. 1961 wurden die beiden anderen Loks (99 331 und
    die 99 332) auf Heißdampf umgebaut, 99 333 blieb eine Naßdampflok und war ab Mitte
    der 1960er Jahre nur noch Reservemaschine. 1968 wurde sie ausgemustert. (24.08.1966)
    <i>Foto: Joachim Claus</i>'
  datum: 24.08.1966
  quelle: Eisenbahnstiftung
