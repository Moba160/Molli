  text: '<b>"Molli" in Bad Doberan (34)</b><br>Damals wie heute zwängt sich die "Molli"
    durch die Straßen von Bad Doberan. Hier ist es noch zu Reichsbahnzeiten 99 2322
    (Baujahr 1932) mit P 14143 in der Goethestraße. (01.08.1988) <i>Foto: Wolfgang
    Bügel</i>'
  datum: 01.08.1988
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/82575.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/82575_x.jpg
  text: '<b>"Molli" in Bad Doberan (35)</b><br>Genauso eng ging und geht es in der
    Ernst-Thälmann-Straße (heute Mollistraße) in Bad Doberan zu. Für das Lokpersonal
    ist hier höchste Aufmerksamkeit gefordert. Gelegentlich kommt es dennoch zu Unfällen,
    die im Regelfall auf das Fehlverhalten der Straßenverkehrsteilnehmer gehen, die
    es tatsächlich schaffen, den Zug zu übersehen. Wegen der niedrigen Geschwindigkeiten,
    die hier gefahren werden, gehen solche Unfälle meist glimpflich aus. (01.08.1988)
    <i>Foto: Wolfgang Bügel</i>'
  datum: 01.08.1988
  quelle: Eisenbahnstiftung
