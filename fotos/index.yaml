  text: '<b>"Molli" in Bad Doberan (23)</b><br>99 2323 als "Straßenbahn" in der Goethestraße
    in Bad Doberan. Es ist Ferienzeit und es herrscht an der Ostseeküste Hochbetrieb.
    Der Freie Deutsche Gewerkschaftsbund (FDGB) war in der DDR der größte Anbieter
    von Urlaubsreisen und die Gäste in den FDGB-Heimen wurden rundum versorgt. Eine
    der größten Hotels zur DDR-Zeit war das FDGB-Erholungsheim „Waterkant“ in Börgerende,
    knapp 5 km nördlich von Bad Doberan. Es wurde am 11. August 1976 eröffnet und
    hatte 462 Betten, eine Gaststätte mit 240 Plätzen, Schwimmbad und etliche medizinische
    Einrichtungen. Das seit kurz nach der Wende leerstehende Bauwerk zerfiel zur Ruine
    und wurde 2008 abgerissen.  (06.09.1983) <i>Foto: Joachim Schmidt</i>'
  datum: 06.09.1983
  quelle: Eisenbahnstiftung
