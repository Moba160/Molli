  text: '<b>"Molli" in Bad Doberan (26)</b><br>99 2321 vor dem Prinzenpalais am Alexandrinenplatz.
    Das Haus im Stil des Klassizismus wurde 1821 eigentlich als Privatresidenz des
    Erbauers, dem Architekten Carl Theodor Severin, erbaut. Kurz nach der Fertigstellung
    wurde er dazu gedrängt, das Haus an den Erbgroßherzog, den späteren Großherzog
    Paul Friedrich von Mecklenburg-Schwerin zu verkaufen. Zu DDR-Zeiten war hier eine
    Schule untergebracht, heute ein Hotel. (06.09.1983) <i>Foto: Joachim Schmidt</i>'
  datum: 06.09.1983
  quelle: Eisenbahnstiftung
