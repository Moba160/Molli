  text: '<b>"Molli" in Bad Doberan (18)</b><br>Die bis heute legendäre Ortsdurchfahrt
    der Bäderbahn "Molli" in der Mollistraße in Bad Doberan, die zu DDR-Zeiten noch
    Ernst-Thälmann-Straße hieß und auch optisch etwas anders aussah. 99 2323 ist dort
    Richtung Bahnhof unterwegs, wo Übergang zur normalspurigen Reichsbahn bestand.
    (06.09.1983) <i>Foto: Joachim Schmidt</i>'
  datum: 06.09.1983
  quelle: Eisenbahnstiftung
