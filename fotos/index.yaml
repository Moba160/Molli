  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/63980_x.jpg
  text: '<b>Wintersportsonderzug (109)</b><br>In den 1980er Jahren wehte vor den Bahnhöfen
    an Rhein und Ruhr die "Schachbrettfahne", wenn die Schneelage im Sauerland gut
    war und u.a. von Münster, Mönchengladbach und Duisburg Wintersportsonderzüge nach
    Winterberg verkehrten. Die Züge waren damals mit Loks der BR 215 des Bw Krefeld,
    221 des Bw Osterfeld und Hagener 218 bespannt und sorgten mit ihren Dampfheizungen
    für mollige Wärme im Zug. In diesem Winter bestellte der Zweckverband NWL wieder
    Sonderzüge nach Winterberg. Vom 21.12.2019 bis zum 07.03.2020 verkehrte samstags
    ein Zug von Oberhausen nach Winterberg. Am ersten Einsatztag bespannte 218 457
    von Aix Rail mit Wagen der Centralbahn den Sonderzug, der mit Fahrkarten des Nahverkehrs
    benutzt werden konnte. Der Zug wird heute allerdings ohne Schachbrettfahne angekündigt.
    Das Bild des ersten Zuges entstand auf der Rückfahrt aus Winterberg beim schneelosen
    Zwischenstop in Bochum Hbf. (21.12.2019) <i>Foto: Marcus Henschel</i>'
  datum: 21.12.2019
  quelle: Eisenbahnstiftung
