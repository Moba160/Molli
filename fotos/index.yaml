- foto: https://eisenbahnstiftung.de/images/bildergalerie/78781.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/78781_x.jpg
  text: '<b>099 902 in Bad Doberan</b><br>Die so moderne Deutsche Bahn hätte sich
    sicherlich nicht träumen lassen, dass sie Lokomotiven mit der Baureihenbezeichnung
    "0" wieder in ihren offiziellen Bestand übernehmen musste. War doch dieses Grundübel
    seit 1977 aus den Bestandslisten (im Westen) gestrichen worden. Dummerweise kamen
    mit der Vereinigung beider Bahnen im Jahr 1994 zahlreiche Schmalspurdampflokomotiven
    wieder in den Bestand der neuen Bahn. So musste man notgedrungen die vorhandenen
    Schmalspurloks der DR wieder mit der computergerechten Null versehen, so wie hier
    99 2322, die als 099 902 den Bü Dammchaussee in Bad Doberan befährt. Der Spuk
    sollte jedoch nicht lange dauern, waren die Bürokraten damit beschäftigt, die
    Schmalspurbahnen schnellstmöglich zu privatisieren, um so das dampfende Übel wieder
    loszuwerden. Die wenigen am Ende noch vorhandenen normalspurigen Dampfloks fielen
    dabei nicht ins Gewicht, da sie in der Öffentlichkeit nicht mit einer solchen
    EDV-Nummer in Erscheinung traten. So fuhr z.B. 01 150 nie mit der befremdlichen
    EDV-Nummer 088 011-2 herum. (04.1995) <i>Foto: Hans-Jürgen Bockfeld</i>'
  datum: ''
  quelle: Eisenbahnstiftung
