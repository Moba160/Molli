  text: '<b>"Molli" in Bad Doberan (32)</b><br>99 2321 mit P 14137 aus Ostseebad Kühlungsborn
    vor dem "Haus Gottesfrieden" in Bad Doberan. Das "Haus Gottesfrieden" ist das
    ehemalige Wohnhaus des Architekten Carl Theodor Severin, das er im Jahre 1823/24
    errichten ließ. Severin war u.a. auch für das Gesellschafts-, Tanz- und Speisehaus
    (heute Kurhaus) in Heiligendamm der verantwortliche Architekt. (01.08.1988) <i>Foto:
    Wolfgang Bügel</i>'
  datum: 01.08.1988
  quelle: Eisenbahnstiftung
