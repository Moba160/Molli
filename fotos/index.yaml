  text: '<b>99 3313 in Muskau</b><br>Zur Erschließung der Wälder und Rohstoffvorkommen
    im Umfeld von Muskau und Weißwasser wurde bereits um 1890 eine Pferdebahn mit
    einer Spurweite von 600 mm angelegt. Damit wurden die entstandenen Industriebetriebe
    (Braunkohlegruben, Ziegeleien, Sägewerke, Papierfabriken und Glashütten) über
    das Bahnnetz angeschlossen. Schon 1895 wurden die ersten beiden Dampfloks angeschafft.
    Bis zur Jahrhundertwende wuchs das Gleisnetz auf etwa 50 km. 99 3313 wurde 1914
    von Borsig als Heeresfeldbahnlok in Dienst gestellt und kam 1921 als 8836 nach
    Muskau. Die Reichsbahn musterte sie 1984 aus. (1975) <i>Foto: Joachim Schmidt</i>'
  datum: '1975'
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/85666.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/85666_x.jpg
  text: '<b>Waldeisenbahn Muskau (4)</b><br>Die Lokomotive "DIANA" der Waldeisenbahn
    Muskau wurde 1912 von Borsig gebaut. Sie erhielt 1951 nach der Übernahme der Waldeisenbahn
    durch die Deutsche Reichsbahn die Betriebsnummer 99 3312 (Aufnahme in Krauschwitz).
    Die Lokomotive ist noch heute betriebsfähig erhalten. Die Waldbahn entstand 1895,
    als der Muskauer Standesherr Graf Hermann von Arnim zur Erschließung der Wälder
    und Rohstoffvorkommen im Umfeld von Muskau und Weißwasser eine Pferdebahn mit
    einer Spurweite von 600 mm anlegen ließ. Außerdem sollten damit die entstandenen
    Industriebetriebe (Braunkohlegruben, Ziegeleien, Sägewerke, Papierfabriken und
    Glashütten) an das Bahnnetz angeschlossen werden. Schon im Entstehungsjahr wurden
    die ersten beiden Dampfloks angeschafft. Bis zur Jahrhundertwende wuchs das Gleisnetz
    auf etwa 50 km. (05.07.1976) <i>Foto: Hans-Jürgen Trunk</i>'
  datum: 05.07.1976
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/93371.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/93371_x.jpg
  text: '<b>Dampfkleinbahn Mühlenstroth -1</b><br>Die Dampf-Kleinbahn Mühlenstroth
    ist eine vom gleichnamigen Verein betriebene schmalspurige Kleinbahnanlage in
    Gütersloh. Die Bahn befindet sich auf dem Gelände einer Ausflugsgaststätte. Die
    kreisförmige, 1,5 km lange Gleisanlage umrundet eine etwa 240 Meter mal 280 Meter
    große Wiese, in deren Mitte sich Lokschuppen und Wagenhalle befinden. Die zuletzt
    bei der Muskauer Waldbahn eingesetzte 99 3318 dreht hier ihre Runden. (01.05.2023)
    <i>Foto: Joachim Schmidt</i>'
  datum: 01.05.2023
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/93372.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/93372_x.jpg
  text: '<b>Dampfkleinbahn Mühlenstroth -2</b><br>99 3318 war ursprünglich als Brigadelokomotive
    "HF 2301" (Borsig, Baujahr 1918) für den Truppen- und Materialtransport im Ersten
    Weltkrieg gebaut worden. Nach Kriegsende wurde die Lok nach Polen verkauft und
    gelangte schließlich nach Litauen. Im Zweiten Weltkrieg fand sich die Lok in den
    von deutschen besetzten Gebieten wieder und wurde als Beutelok zurück nach Deutschland
    transportiert. 1948 übernahm sie das Braunkohlenwerk "Frieden" in Weißwasser,
    1953 ging sie an die Waldeisenbahn Muskau über. Dort wurde ihr von der Deutschen
    Reichsbahn die Nummer 99 3318 zugeteilt. Bis Ende 1972 stand sie dort im Einsatz.
    Nach einer betriebsfähigen Aufarbeitung Anfang 1974 wurde die Lok im April selben
    Jahres an die Dampf-Kleinbahn Mühlenstroth in Gütersloh verkauft. (01.05.2023)
    <i>Foto: Joachim Schmidt</i>'
  datum: 01.05.2023
  quelle: Eisenbahnstiftung
