  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/37101.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/37101_x.jpg
  text: '<b>99 3315 in Bad Muskau (1)</b><br>99 3315 trifft in Bad Muskau ein. Die
    Henschel-Brigadelok kam 1917 zur Heeresfeldbahn und dort die HFB-Nummer 1547 zugeteilt.
    1922 erwarb sie die Gräflich von Armin''sche Kleinbahn, heute als Waldeisenbahn
    Muskau bekannt, und setzte sie auf ihren Strecken ein. (11.04.1975) <i>Foto: Johannes
    Glöckner</i>'
  datum: 11.04.1975
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/37102.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/37102_x.jpg
  text: '<b>99 3315 in Bad Muskau (2)</b><br>1951 übernahm die Deutsche Reichsbahn
    der DDR die Anlagen und Betriebsführung der durch Reparationsleistungen und Kriegsschäden
    arg gebeutelten Muskauer Waldbahn. Hierbei wurden auch die dort vorhandenen Lokomotiven
    eingegeliedert. Die ehemalige Henschel-Brigadelok (HFB-Nr. 1547) bekam die Betriebsnummer
    99 3315 zugeteilt. 1977 wurde die Lok mit fortschreitender Stillegung der Bahn
    abgestellt und an die Dampf-Kleinbahn Mühlenstroth in Gütersloh verkauft. Dort
    wurde die Lok als Nr. 6  "Richard Roosen" in den Fahrzeugpark eingereiht und war
    bis 2003 regelmäßig vor Museumszügen im Einsatz. Im Herbst 2013 kehrte die Lok
    zur Waldeisenbahn Muskau zurück und traf am 04.10.2013 wieder in ihrer alten Heimat
    Weißwasser ein. Am 10. September 2015 wurde sie ins tschechischen Zamberk gebracht,
    wo die Lok eine Hauptuntersuchung erhalten soll. Danach soll sie die vorhandenen
    Lokomotiven 99 3312 und 99 3317 beim Einsatz vor den Museumszügen auf ihren alten
    Stammstrecken unterstützen. (11.04.1975) <i>Foto: Johannes Glöckner</i>'
  datum: 11.04.1975
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/37103.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/37103_x.jpg
  text: '<b>99 3315 bei Bad Muskau (3)</b><br>99 3315 kurz vor Bad Muskau.  (11.04.1975)
    <i>Foto: Johannes Glöckner</i>'
  datum: 11.04.1975
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/41819.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/41819_x.jpg
  text: '<b>Waldeisenbahn Muskau (3)</b><br>99 3317 auf der vom Muskauer Standesherr
    Graf Hermann von Arnim 1895 zur Erschließung der Wälder und Rohstoffvorkommen
    im Umfeld von Muskau und Weißwasser gegründeten (Pferde-)bahn mit einer Spurweite
    von 600 mm. Die Industriebetriebe (Braunkohlegruben, Ziegeleien, Sägewerke, Papierfabriken
    und Glashütten) sollten so an das Bahnnetz angeschlossen werden. Schon 1895 wurden
    die ersten beiden Dampfloks angeschafft (die erste Dampflok war die dreiachsige
    Tenderlokomotive "GRAF ARNIM", die 1895 bei Krauss in München gebaut wurde. Bis
    zur Jahrhundertwende wuchs das Gleisnetz bereits auf etwa 50 km an. 99 3317 wurde
    1918 als Heeresfeldbahnlok in Dienst gestellt und kam erst nach dem Zweiten Weltkrieg
    nach Muskau. (1967) <i>Foto: J. R. Broughton</i>'
  datum: '1967'
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/53139.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/53139_x.jpg
  text: '<b>Muskauer Waldbahn (5)</b><br>Die Waldeisenbahn Muskau wurde 1895 zur Erschließung
    der Wälder und Rohstoffvorkommen im Umfeld von Muskau und Weißwasser mit einer
    Spurweite von 600 mm angelegt. Zudem sollten damit die entstandenen Industriebetriebe
    (Braunkohlegruben, Ziegeleien, Sägewerke, Papierfabriken und Glashütten) an das
    Bahnnetz angeschlossen werden. Heute ist sie die größte Museumsbahn in 600-mm-Spur
    in Deutschland. 99 3313 (die ehemalige Heeresfeldbahnlok 312 aus dem Jahr 1914)
    ist hier bei Bad Muskau unterwegs. (06.1973) <i>Foto: Robin Fell</i>'
  datum: ''
  quelle: Eisenbahnstiftung
