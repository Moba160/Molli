  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/9710_x.jpg
  text: '<b>Waldeisenbahn Muskau (2)</b><br>Die Lokomotive "DIANA" der Waldeisenbahn
    Muskau wurde 1912 von Borsig gebaut. Die Lokomotive erhielt 1951 nach der Übernahme
    der Waldeisenbahn durch die Deutsche Reichsbahn die Betriebsnummer 99 3312. Die
    Lokomotive ist noch heute betriebsfähig erhalten. (26.04.1976) <i>Foto: Will A.
    Reed</i>'
  datum: 26.04.1976
