- foto: https://eisenbahnstiftung.de/images/bildergalerie/61654.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/61654_x.jpg
  text: '<b>Inselbahn Borkum (18)</b><br>99 331 vor dem Borkumer Wahrzeichen des "Großen
    Leuchtturms Borkum", der im westlichen Teil des Stadtzentrums der Insel Borkum
    steht und einer von drei Leuchttürmen auf der Insel ist. Nachdem der "Alte Leuchtturm
    Borkum" abgebrannt war, entstand der neue Leuchtturm im Jahr 1879 in Rekordzeit.
    Zwischen der Grundsteinlegung am 1. Mai und dem Richtfest am 20. September lagen
    weniger als fünf Monate. Er besitzt eine 3 m hohe Drehlinsenleuchte mit sechs
    großen Linsenfeldern, deren Nennreichweite 24,4 Seemeilen (ca. 45 Kilometer) beträgt.  (19.09.2019)
    <i>Foto: Joachim Schmidt</i>'
  datum: 19.09.2019
  quelle: Eisenbahnstiftung
