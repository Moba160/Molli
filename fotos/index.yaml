- foto: https://eisenbahnstiftung.de/images/bildergalerie/17461.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/17461_x.jpg
  text: '<b>99 3314 in Krauschwitz</b><br>99 3314 wurde ursprünglich 1917 von Henschel
    als Heeresfeldbahnlok "HF 1487" gebaut und gelangte 1921 zur Waldeisenbahn Muskau.
    1951 erhielt sie dort nach der Übernahme durch die Deutsche Reichsbahn die Nummer
    99 3314. 1983 wurde sie schließlich in den Westen verkauft und war u.a. bei der
    Dampf-Kleinbahn Mühlenstroth nahe Gütersloh im Einsatz. Sie befindet sich heute
    in Privatbesitz. (21.03.1978) <i>Foto: Slg. Wolfgang Bügel</i>'
  datum: 21.03.1978
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/25291.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/25291_x.jpg
  text: '<b>99 3312 in Bad Muskau</b><br>Die Lok "DIANA" der Waldeisenbahn Muskau
    (WEM) wurde 1912 von Borsig hergestellt. Sie erhielt 1951 nach der Übernahme durch
    die Deutsche Reichsbahn die Betriebsnummer 99 3312 und ist seit 1998 wieder betriebsfähig
    auf dem Streckennetz der Museumsbahn im Einsatz. (24.05.2015) <i>Foto: Andreas
    Höfig</i>'
  datum: 24.05.2015
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/31068.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/31068_x.jpg
  text: '<b>Muskauer Waldbahn (1)</b><br>Die von Henschel 1917 gebaute Heeresfeldbahnlok
    (HFB-Nummer 1547) landete zum Ende des 1. Weltkriegs zunächst in einem Demobilisierungslager.
    1922 erwarb die Gräflich von Arminsche Kleinbahn, heute als Waldeisenbahn Muskau
    bekannt, die Lok und setzte sie auf ihren Strecken ein. Als 1951 die Waldeisenbahn
    Muskau von der Deutschen Reichsbahn übernommen wurde, erhielt sie die Betriebsnummer
    99 3315. 1977 wurde sie an die Dampf-Kleinbahn Mühlenstroth in Gütersloh verkauft.
    Dort als Nr. 6  "Richard Roosen" in den Fahrzeugpark eingereiht, fuhr sie bis
    2003 regelmäßig vor den Museumszügen. Im Sommer 2008 wurde die Lok reaktiviert
    und kam anlässlich des 35-jährigen Vereinsbestehens letztmalig zum Einsatz. (29.03.1973)
    <i>Foto: Johannes Glöckner</i>'
  datum: 29.03.1973
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/31069.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/31069_x.jpg
  text: '<b>Muskauer Waldbahn (2)</b><br>99 3316 (Borsig, Baujahr 1916) rangiert in
    Muskau. Die Lok wurde im August 1916 als HF 634 an den Übungsplatz Rehagen-Klausdorf
    ausgeliefert und gelangte erst Mai 1950 zur Waldeisenbahn Muskau. Im April 1984
    wurde sie an das Technikmuseum Sinsheim verkauft. (29.03.1973) <i>Foto: Johannes
    Glöckner</i>'
  datum: 29.03.1973
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/31071.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/31071_x.jpg
  text: '<b>Muskauer Waldbahn (4)</b><br>99 3316 mit einem Güterzug unterwegs bei
    Muskau. (29.03.1973) <i>Foto: Johannes Glöckner</i>'
