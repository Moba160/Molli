- foto: https://eisenbahnstiftung.de/images/bildergalerie/94974.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/94974_x.jpg
  text: '<b>99 2322, 2331 in Kühlungsborn</b><br>Im Ostseebad Kühlungsborn West warten
    99 2331 und 99 2322. Gut zu erkennen sind die Bauartunterschiede der beiden Loks.
    99 2331 des Typs 225 PS Schmalspur des VEB Lokomotivbau Karl Marx basiert auf
    einem Typenprogramm für kleinere Dampflokomotiven, die speziell für den Einsatz
    bei Industriebetrieben entwickelt wurden. Ende der 1950er Jahre sah sich die Reichsbahn
    veranlasst, die 27 Jahre alten Lokomotiven der Baureihe 99.31 zu ersetzen. Ein
    Nachbau der Baureihe 99.32 war nicht möglich. So erwarb die Reichsbahn drei Lokomotiven
    von der SDAG Wismut. Im April 1959 wurde 99 331 (ehemals Nr. 22) nach Anpassungsarbeiten
    im Raw Görlitz in Dienst gestellt. 1961 wurden sie auf Heißdampf umgebaut. 99
    2322 hingegen wurde 1932 nach den Einheitsgrundsätzen der Deutschen Reichsbahn
    gebaut und ist auch bis heute bei der "Molli" im Einsatz. (06.1979) <i>Foto: Robin
    Fell</i>'
  datum: ''
  quelle: Eisenbahnstiftung
