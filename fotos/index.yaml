- foto: https://eisenbahnstiftung.de/images/bildergalerie/110757.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/110757_x.jpg
  text: '<b>Molli (28)</b><br>Seit 1886 gehört die Mecklenburgische Bäderbahn Molli
    (vormals Großherzoglich Mecklenburgische Friedrich-Franz-Eisenbahn) mit der seltenen
    Spurweite von 900 mm zum Stadtbild in Bad Doberan. Der Klassiker ist seitdem die
    Fahrt mitten durch die Hauptgeschäftsstraße, die zwischenzeitlich in "Mollistraße"
    umbenannt wurde. An diesem Tag rollt 99 2322 mit dem Mittagszug aus Kühlungsborn
    West durch die Mollistraße. (25.06.2025) <i>Foto: Joachim Schmidt</i>'
  datum: 25.06.2025
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/110758.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/110758_x.jpg
  text: '<b>Molli (29)</b><br>Erhöhte Aufmerksamkeit erfordert die Fahrt der 99 2322
    durch die Mollistraße in Bad Doberan. Das Lokpersonal muss jederzeit mit unbedachten
    Autofahrern oder Passanten rechnen. Zur Entstehungsgeschichte des Namens "Molli"
    gibt es viele unterschiedliche Geschichten. Am weit verbreitesten ist die Anekdote
    über einen kleinen dicken Mops namens "Molli": Vor mehr als einhundert Jahren
    reiste eine alte Dame mit ihrem kleinen Hund nach Bad Doberan. Natürlich wollte
    auch sie mit der neu eröffneten Dampfeisenbahn von Bad Doberan nach Heiligendamm
    fahren. Doch ihr Mops war unter keinen Umständen zum Einsteigen zu bewegen. Als
    der Hund ausriss, rief die alte Dame ihm noch hinterher: "Molli, bliev stahn!"
    (plattdeutsch für "Molli, bleib stehen!"). Doch nicht etwa der Mops hörte auf
    diesen Ruf, sondern der Lokführer brachte seinen gerade angefahrenen Zug zum Halten.
    Fortan hieß die kleine Bäderbahn im Volksmund "Molli". (25.06.2025) <i>Foto: Joachim
    Schmidt</i>'
  datum: 25.06.2025
  quelle: Eisenbahnstiftung
- foto: https://eisenbahnstiftung.de/images/bildergalerie/110759.jpg
  thumb: https://eisenbahnstiftung.de/images/thumbnails/bildergalerie/110759_x.jpg
  text: '<b>Molli (30)</b><br>99 2322 überquert den Alexandrinenplatz in Bad Doberan.
    Das "Haus Gottesfrieden" (links) ist das ehemalige Wohnhaus des bekannten deutschen
    Stadtarchitekten Carl Theodor Severin (1763–1836), das er im Jahre 1823/24 errichten
    ließ.  (25.06.2025) <i>Foto: Joachim Schmidt</i>'
  datum: 25.06.2025
  quelle: Eisenbahnstiftung
